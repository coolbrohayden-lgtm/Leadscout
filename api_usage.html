<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LeadScout — API Usage</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0c0e;--surface:#101114;--surface2:#16181c;--surface3:#1d2025;
  --border:#24272e;--border-light:#31353e;
  --text:#e7e9ee;--muted:#8a8f98;--muted2:#5e646e;
  --accent:#5e6ad2;--accent-hover:#7c87e0;
  --hot:#f47067;--warm:#f2a33c;--cold:#3dd68c;
  --radius:10px;--radius-sm:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
header{display:flex;align-items:center;gap:10px;padding:0 24px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.logo{font-size:17px;font-weight:800;letter-spacing:-.02em;}
.logo span{background:linear-gradient(135deg,var(--accent),#8b96e8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.btn{padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .15s;white-space:nowrap;text-decoration:none;display:inline-block;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:4px 10px;font-size:11px;}
main{max-width:960px;margin:0 auto;padding:28px 24px;}

/* Period toggle */
.period-tabs{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface);width:fit-content;margin-bottom:24px;}
.period-tab{border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;font-family:inherit;padding:7px 18px;cursor:pointer;transition:all .15s;}
.period-tab.active{background:var(--accent);color:#fff;}

/* Stat cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.card .label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.card .value{font-size:28px;font-weight:800;letter-spacing:-.03em;line-height:1;}
.card .sub{font-size:11px;color:var(--muted);margin-top:6px;}
.card.cost .value{color:var(--warm);}
.card.searches .value{color:var(--accent-hover);}
.card.details .value{color:var(--cold);}

/* Source breakdown */
.section-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.breakdown{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;}
.breakdown-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.breakdown-card .bk-title{font-size:13px;font-weight:700;margin-bottom:12px;}
.bk-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.bk-row:last-child{border-bottom:none;}
.bk-row .ep{color:var(--muted);flex:1;}
.bk-row .cnt{font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;min-width:50px;text-align:right;}
.bk-row .cost-est{font-size:10px;color:var(--muted2);min-width:55px;text-align:right;}

/* Pricing reference */
.pricing-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:28px;}
.pricing-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border);}
.pricing-row:last-child{border-bottom:none;}
.pricing-row .pc-label{color:var(--muted);}
.pricing-row .pc-rate{font-weight:600;font-variant-numeric:tabular-nums;}
.credit-note{font-size:11px;color:var(--cold);margin-top:10px;padding:8px 10px;background:rgba(61,214,140,.07);border:1px solid rgba(61,214,140,.2);border-radius:var(--radius-sm);}

/* Recent table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
thead th{background:var(--surface2);padding:9px 12px;text-align:left;font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(94,106,210,.04);}
.src-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.src-restaurant{background:rgba(242,163,60,.12);color:var(--warm);}
.src-contractor{background:rgba(94,106,210,.12);color:var(--accent-hover);}
.ep-tag{font-size:11px;font-weight:600;}
.ep-nearby{color:var(--accent-hover);}
.ep-details{color:var(--cold);}

.loading{text-align:center;padding:48px;color:var(--muted);font-size:13px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px;}
</style>
</head>
<body>
<header>
  <div class="logo">Lead<span>Scout</span></div>
  <a href="/database" class="btn btn-sm">← Restaurant DB</a>
  <a href="/contractor-database" class="btn btn-sm">Contractor DB</a>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <span id="userLabel" style="font-size:11px;color:var(--muted)"></span>
    <button class="btn btn-sm" onclick="signOut()">Sign Out</button>
  </div>
</header>

<main>
  <h1 style="font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px">API Usage & Cost Tracker</h1>
  <p style="font-size:12px;color:var(--muted);margin-bottom:20px">Google Places API requests made by all scanners — restaurant and contractor.</p>

  <div class="period-tabs">
    <button class="period-tab active" id="tabMonth" onclick="setPeriod('month')">This Month</button>
    <button class="period-tab" id="tabAllTime" onclick="setPeriod('all')">All Time</button>
  </div>

  <div id="content" class="loading">Loading usage data…</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/auth.js"></script>
<script>
// Google Places API pricing (Legacy API, as of 2025)
const PRICE = {
  nearbysearch: 0.032,   // $0.032 per Nearby Search
  placedetails:  0.020,  // $0.017 basic + $0.003 contact fields
};
const FREE_CREDIT = 200; // $200/month Google Maps Platform credit

let period = 'month';
let allRows = [];

async function load() {
  const { data, error } = await supabaseClient
    .from('api_usage_log')
    .select('endpoint, source, user_id, logged_at')
    .order('logged_at', { ascending: false })
    .limit(2000);

  if (error) {
    document.getElementById('content').innerHTML =
      `<div style="color:var(--hot);padding:20px">Could not load usage data — make sure the <code>api_usage_log</code> table exists in Supabase.</div>`;
    return;
  }

  allRows = data || [];
  render();
}

function setPeriod(p) {
  period = p;
  document.getElementById('tabMonth').classList.toggle('active', p === 'month');
  document.getElementById('tabAllTime').classList.toggle('active', p === 'all');
  render();
}

function getRows() {
  if (period === 'all') return allRows;
  const start = new Date();
  start.setDate(1); start.setHours(0, 0, 0, 0);
  return allRows.filter(r => new Date(r.logged_at) >= start);
}

function calcCost(rows) {
  const ns = rows.filter(r => r.endpoint === 'nearbysearch').length;
  const pd = rows.filter(r => r.endpoint === 'placedetails').length;
  const raw = ns * PRICE.nearbysearch + pd * PRICE.placedetails;
  const effective = Math.max(0, raw - (period === 'month' ? FREE_CREDIT : 0));
  return { ns, pd, raw, effective };
}

function fmtMoney(n) {
  return '$' + n.toFixed(2);
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function render() {
  const rows = getRows();
  const { ns, pd, raw, effective } = calcCost(rows);

  // Breakdown by source
  const sources = ['restaurant', 'contractor'];
  const bySource = {};
  sources.forEach(s => {
    const sr = rows.filter(r => r.source === s);
    bySource[s] = {
      ns: sr.filter(r => r.endpoint === 'nearbysearch').length,
      pd: sr.filter(r => r.endpoint === 'placedetails').length,
    };
    bySource[s].cost = bySource[s].ns * PRICE.nearbysearch + bySource[s].pd * PRICE.placedetails;
  });

  // Recent 50
  const recent = rows.slice(0, 50);

  const creditNote = period === 'month'
    ? `<div class="credit-note">✓ Google gives a $200/month free credit — your effective charge this month is <strong>${fmtMoney(effective)}</strong> after the credit is applied.</div>`
    : `<div class="credit-note" style="background:rgba(94,106,210,.07);border-color:rgba(94,106,210,.25);color:var(--accent-hover)">All-time raw total before any monthly credits: <strong>${fmtMoney(raw)}</strong></div>`;

  document.getElementById('content').innerHTML = `
    <div class="cards">
      <div class="card searches">
        <div class="label">Nearby Searches</div>
        <div class="value">${ns.toLocaleString()}</div>
        <div class="sub">${fmtMoney(ns * PRICE.nearbysearch)} est. · $0.032 each</div>
      </div>
      <div class="card details">
        <div class="label">Place Details</div>
        <div class="value">${pd.toLocaleString()}</div>
        <div class="sub">${fmtMoney(pd * PRICE.placedetails)} est. · $0.020 each</div>
      </div>
      <div class="card cost">
        <div class="label">Total Requests</div>
        <div class="value">${(ns + pd).toLocaleString()}</div>
        <div class="sub">Raw cost: ${fmtMoney(raw)}</div>
      </div>
      <div class="card" style="border-color:rgba(61,214,140,.25)">
        <div class="label">Est. Charge${period === 'month' ? ' This Month' : ' (All Time)'}</div>
        <div class="value" style="color:${effective > 0 ? 'var(--hot)' : 'var(--cold)'}">${fmtMoney(effective)}</div>
        <div class="sub">${period === 'month' ? 'After $200 monthly credit' : 'Cumulative after monthly credits'}</div>
      </div>
    </div>

    <p class="section-title">Breakdown by Scanner</p>
    <div class="breakdown">
      ${sources.map(s => `
        <div class="breakdown-card">
          <div class="bk-title">${s === 'restaurant' ? '🍽️ Restaurant' : '🏠 Contractor'}</div>
          <div class="bk-row">
            <span class="ep">Nearby Searches</span>
            <span class="cnt">${bySource[s].ns.toLocaleString()}</span>
            <span class="cost-est">${fmtMoney(bySource[s].ns * PRICE.nearbysearch)}</span>
          </div>
          <div class="bk-row">
            <span class="ep">Place Details</span>
            <span class="cnt">${bySource[s].pd.toLocaleString()}</span>
            <span class="cost-est">${fmtMoney(bySource[s].pd * PRICE.placedetails)}</span>
          </div>
          <div class="bk-row" style="font-weight:700">
            <span class="ep">Total</span>
            <span class="cnt">${(bySource[s].ns + bySource[s].pd).toLocaleString()}</span>
            <span class="cost-est" style="color:var(--warm)">${fmtMoney(bySource[s].cost)}</span>
          </div>
        </div>`).join('')}
    </div>

    <p class="section-title">Pricing Reference</p>
    <div class="pricing-card">
      <div class="pricing-row">
        <span class="pc-label">Nearby Search</span>
        <span class="pc-rate">$0.032 / request</span>
      </div>
      <div class="pricing-row">
        <span class="pc-label">Place Details (Basic + Contact)</span>
        <span class="pc-rate">$0.020 / request</span>
      </div>
      <div class="pricing-row">
        <span class="pc-label">Email scraping (/scrape-email)</span>
        <span class="pc-rate" style="color:var(--cold)">Free — no Google API</span>
      </div>
      ${creditNote}
    </div>

    <p class="section-title" style="margin-bottom:12px">Recent Calls (last ${recent.length})</p>
    ${recent.length === 0
      ? '<div style="color:var(--muted);font-size:12px;padding:20px 0">No calls recorded yet — start scanning to see activity here.</div>'
      : `<div class="table-wrap">
          <table>
            <thead><tr>
              <th>Time</th>
              <th>Endpoint</th>
              <th>Scanner</th>
              <th>Cost Est.</th>
            </tr></thead>
            <tbody>
              ${recent.map(r => `<tr>
                <td style="color:var(--muted);white-space:nowrap">${fmtDate(r.logged_at)}</td>
                <td><span class="ep-tag ep-${r.endpoint === 'nearbysearch' ? 'nearby' : 'details'}">${r.endpoint === 'nearbysearch' ? 'Nearby Search' : 'Place Details'}</span></td>
                <td><span class="src-tag src-${r.source}">${r.source === 'restaurant' ? '🍽️ Restaurant' : '🏠 Contractor'}</span></td>
                <td style="font-variant-numeric:tabular-nums;color:var(--muted)">${fmtMoney(PRICE[r.endpoint] || 0)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`
    }
  `;
}

(async function init() {
  await requireAuth();
  document.getElementById('userLabel').textContent = await getUserName();
  await load();
})();
</script>
</body>
</html>
