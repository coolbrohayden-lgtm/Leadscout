<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LeadScout — Contractor Database</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0c0e;--surface:#101114;--surface2:#16181c;--surface3:#1d2025;
  --border:#24272e;--border-light:#31353e;
  --text:#e7e9ee;--muted:#8a8f98;--muted2:#5e646e;
  --accent:#5e6ad2;--accent-hover:#7c87e0;--hot:#f47067;
  --green:#2a6b4a;--green-light:#3dd68c;
  --radius:10px;--radius-sm:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;}
header{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:18px;font-weight:800;letter-spacing:-.02em;}
.logo span{background:linear-gradient(135deg,var(--accent),#8b96e8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.logo sub{font-size:10px;font-weight:600;color:var(--green-light);-webkit-text-fill-color:var(--green-light);margin-left:4px;vertical-align:middle;}
.btn{padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-accent:hover{background:var(--accent-hover);border-color:var(--accent-hover);color:#fff;}
.btn-green{background:var(--green);border-color:var(--green);color:#fff;}
.btn-green:hover{background:#1e5438;color:#fff;}
.btn-sm{padding:4px 8px;font-size:11px;}
.btn-danger{color:var(--hot);border-color:transparent;background:transparent;}
.btn-danger:hover{background:rgba(244,112,103,.1);border-color:var(--hot);}
.filters{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap;}
.filters input,.filters select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;font-family:inherit;padding:6px 10px;outline:none;transition:border .15s;}
.filters input:focus,.filters select:focus{border-color:var(--accent);}
.filters select option{background:var(--surface2);}
#searchInput{width:180px;}
.count-badge{font-size:12px;color:var(--muted);}
.count-badge strong{color:var(--text);}
.table-wrap{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{position:sticky;top:0;background:var(--surface);padding:9px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--text);}
thead th.sorted{color:var(--accent);}
thead th.no-sort{cursor:default;}
thead th.no-sort:hover{color:var(--muted);}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:hover{background:var(--surface2);}
tbody td{padding:8px 12px;vertical-align:middle;}
td.name{font-weight:600;max-width:180px;}
td.name a{color:var(--text);text-decoration:none;}
td.name a:hover{color:var(--accent);}
td.county{color:var(--muted);white-space:nowrap;}
.cat-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;}
.cat-roofing{background:rgba(244,112,103,.15);color:#f47067;}
.cat-windows{background:rgba(94,106,210,.15);color:#8b96e8;}
.cat-shutters{background:rgba(61,214,140,.15);color:#3dd68c;}
.cat-hvac{background:rgba(255,180,50,.15);color:#ffb432;}
.stars{color:#f5c518;}
.rev-count{color:var(--muted2);font-size:10px;}
td.phone a{color:var(--text);text-decoration:none;white-space:nowrap;}
td.phone a:hover{color:var(--accent);}
td.email-cell a{color:var(--accent);text-decoration:none;font-size:11px;}
td.web a{color:var(--accent);text-decoration:none;font-size:11px;max-width:130px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td.addr{color:var(--muted);font-size:11px;max-width:150px;}
td.date{color:var(--muted2);font-size:11px;white-space:nowrap;}
.claim-btn{padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap;}
.claim-btn:hover{border-color:var(--accent);color:var(--accent);}
.claim-btn.claimed{background:rgba(61,214,140,.12);border-color:var(--green-light);color:var(--green-light);}
.claim-btn.claimed:hover{background:rgba(244,112,103,.1);border-color:var(--hot);color:var(--hot);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--muted);}
.empty-state .icon{font-size:36px;opacity:.4;}

/* View toggle (Table / Pipeline) */
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface);}
.view-toggle button{border:none;background:transparent;color:var(--muted);font-size:11.5px;font-weight:600;font-family:inherit;padding:6px 13px;cursor:pointer;transition:all .15s;}
.view-toggle button:hover{color:var(--text);}
.view-toggle button.active{background:var(--accent);color:#fff;}

/* Pipeline (kanban) board */
.pipeline-wrap{display:flex;gap:14px;padding:18px 16px;overflow-x:auto;align-items:flex-start;height:100%;}
.pipe-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-width:270px;width:270px;flex-shrink:0;display:flex;flex-direction:column;max-height:100%;}
.pipe-col-head{padding:11px 14px;border-bottom:2px solid var(--pipe-color,var(--border));display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;}
.pipe-col-head .t{font-size:12px;font-weight:700;letter-spacing:.01em;}
.pipe-col-head .n{font-size:10px;font-weight:700;background:var(--surface3);border-radius:10px;padding:2px 8px;color:var(--muted);margin-left:auto;}
.pipe-col-body{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;min-height:80px;transition:background .15s;}
.pipe-col-body.drag-over{background:rgba(94,106,210,.1);outline:2px dashed var(--accent);outline-offset:-4px;border-radius:0 0 var(--radius) var(--radius);}
.pipe-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;cursor:grab;transition:all .15s;}
.pipe-card:hover{border-color:var(--border-light);transform:translateY(-1px);}
.pipe-card.dragging{opacity:.4;cursor:grabbing;}
.pipe-card .nm{font-size:12.5px;font-weight:700;margin-bottom:5px;letter-spacing:-.01em;}
.pipe-card .nm a{color:var(--text);text-decoration:none;}
.pipe-card .nm a:hover{color:var(--accent);}
.pipe-card .meta{font-size:10.5px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pipe-card .foot{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.pipe-card .foot a{font-size:11px;color:var(--accent);text-decoration:none;}
.pipe-empty{font-size:10.5px;color:var(--muted2);text-align:center;padding:18px 0;}

/* Stage column controls (move / minimize) */
.col-actions{display:flex;gap:1px;align-items:center;}
.col-btn{border:none;background:transparent;color:var(--muted2);font-size:14px;font-weight:700;cursor:pointer;padding:0 3px;border-radius:3px;line-height:1;transition:color .15s;font-family:inherit;}
.col-btn:hover:not(:disabled){color:var(--text);}
.col-btn:disabled{opacity:.25;cursor:default;}

/* Collapsed stage column (GHL-style vertical bar) */
.pipe-col.collapsed{min-width:46px;width:46px;cursor:pointer;align-self:stretch;}
.pipe-col.collapsed:hover{border-color:var(--accent);}
.pipe-col.collapsed.drag-over{border-color:var(--accent);background:rgba(94,106,210,.1);}
.pipe-col-collapsed-inner{display:flex;flex-direction:column;align-items:center;gap:12px;padding:12px 0;height:100%;border-top:2px solid var(--pipe-color,var(--border));border-radius:var(--radius);}
.cc-count{font-size:11px;font-weight:800;background:var(--surface3);border-radius:10px;padding:2px 7px;color:var(--muted);}
.cc-title{writing-mode:vertical-rl;transform:rotate(180deg);font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;flex:1;}
.cc-icon{font-size:13px;color:var(--muted2);}

/* Status dropdown */
.status-sel{background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:11px;font-weight:600;font-family:inherit;padding:3px 6px;cursor:pointer;outline:none;transition:all .15s;}
.status-sel.st-new{color:var(--muted);}
.status-sel.st-contacted{color:#ffb432;border-color:rgba(255,180,50,.4);}
.status-sel.st-qualified{color:var(--green-light);border-color:rgba(61,214,140,.4);}
.status-sel.st-closed{color:var(--hot);border-color:rgba(244,112,103,.4);}

/* Copy-number button */
.phone-wrap{display:inline-flex;align-items:center;gap:5px;}
.copy-btn{border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;line-height:1;cursor:pointer;border-radius:5px;padding:3px 6px;font-family:inherit;transition:all .12s;flex-shrink:0;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn.copied{border-color:var(--green-light);color:var(--green-light);}

/* Inline notes field */
td.notes-cell{min-width:150px;max-width:200px;}
.notes-input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:11px;font-family:inherit;width:100%;padding:3px 0;outline:none;transition:border .15s;}
.notes-input:focus{border-bottom-color:var(--accent);}
.notes-input::placeholder{color:var(--muted2);}
.pipe-card .notes-input{border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 7px;margin-top:6px;background:var(--surface);}

/* Add-stage button + stage delete */
.add-stage-btn{min-width:150px;flex-shrink:0;align-self:flex-start;border:2px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--muted);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;padding:18px;transition:all .15s;}
.add-stage-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(94,106,210,.06);}

/* Stage modal */
.modal-overlay{position:fixed;inset:0;background:rgba(5,7,10,.72);backdrop-filter:blur(3px);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:24px;width:340px;max-width:90%;position:relative;display:flex;flex-direction:column;gap:14px;}
.modal h3{font-size:15px;font-weight:800;}
.modal label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);display:flex;flex-direction:column;gap:5px;}
.modal input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit;padding:8px 10px;outline:none;}
.modal input:focus{border-color:var(--accent);}
.modal-close{position:absolute;top:12px;right:14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;color:var(--muted);font-size:13px;}
.stage-colors{display:flex;gap:8px;}
.swatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.swatch:hover{transform:scale(1.12);}
.swatch.sel{border-color:#fff;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px;}
</style>
</head>
<body>
<header>
  <div class="logo">Lead<span>Scout</span> <sub>CONTRACTOR DB</sub></div>
  <a href="/contractors" style="text-decoration:none"><button class="btn btn-sm">← Back to Scan</button></a>
  <a href="/my-contractor-leads" target="_blank" style="text-decoration:none"><button class="btn btn-sm btn-green">My Claimed Leads</button></a>
  <a href="/api-usage" target="_blank" style="text-decoration:none"><button class="btn btn-sm" style="border-color:rgba(94,106,210,.4);color:var(--accent)">📊 API Usage</button></a>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <span id="userLabel" style="font-size:11px;color:var(--muted)"></span>
    <button class="btn btn-sm" onclick="signOut()">Sign Out</button>
  </div>
</header>

<div class="filters">
  <div class="view-toggle">
    <button id="viewTableBtn" class="active" onclick="setView('table')">Table</button>
    <button id="viewPipeBtn" onclick="setView('pipeline')">Pipeline</button>
  </div>
  <input id="searchInput" type="text" placeholder="Search company name…" oninput="applyFilters()"/>
  <select id="filterCounty" onchange="applyFilters()"><option value="">All Counties</option></select>
  <select id="filterCat" onchange="applyFilters()">
    <option value="">All Types</option>
    <option value="roofing">Roofing</option>
    <option value="windows">Windows</option>
    <option value="shutters">Storm Shutters</option>
    <option value="hvac">HVAC</option>
  </select>
  <select id="filterStatus" onchange="applyFilters()">
    <option value="">All Statuses</option>
    <option value="new">New</option>
    <option value="contacted">Contacted</option>
    <option value="qualified">Qualified</option>
    <option value="closed">Closed</option>
  </select>
  <button class="btn btn-sm" onclick="exportCSV()">Export CSV</button>
  <span class="count-badge" id="countBadge" style="margin-left:auto"></span>
</div>

<div class="table-wrap" id="tableView">
  <table id="leadsTable">
    <thead>
      <tr>
        <th class="no-sort"></th>
        <th onclick="sortBy('name')">Company</th>
        <th onclick="sortBy('county')">County</th>
        <th onclick="sortBy('category')">Type</th>
        <th onclick="sortBy('rating')">Rating</th>
        <th onclick="sortBy('status')">Status</th>
        <th class="no-sort">Phone</th>
        <th class="no-sort">Email</th>
        <th class="no-sort">Website</th>
        <th class="no-sort">Address</th>
        <th class="no-sort">Notes</th>
        <th onclick="sortBy('saved_at')">Saved</th>
        <th class="no-sort"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">🏠</div>
    <p>No contractor leads saved yet. Run a scan first.</p>
  </div>
</div>
<div id="pipelineView" style="flex:1;overflow:hidden;display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/auth.js"></script>
<script>
const CAT_LABELS = {roofing:'Roofing',windows:'Windows',shutters:'Storm Shutters',hvac:'HVAC'};
let allLeads = [];
let myClaimedIds = new Set(); // lead IDs claimed by current user
let claimIdMap = {};          // lead_id → claim row id
let sortCol = 'saved_at';
let sortDir = -1;

async function loadLeads() {
  const [leadsRes, claimsRes] = await Promise.all([
    supabaseClient.from('contractor_leads').select('*').order('saved_at', {ascending:false}),
    supabaseClient.from('contractor_claims').select('id,lead_id').eq('user_id', currentUser.id),
  ]);

  allLeads = leadsRes.data || [];

  (claimsRes.data || []).forEach(c => {
    myClaimedIds.add(c.lead_id);
    claimIdMap[c.lead_id] = c.id;
  });

  const counties = [...new Set(allLeads.map(r => r.county).filter(Boolean))].sort();
  const sel = document.getElementById('filterCounty');
  counties.forEach(c => { const o = document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });

  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const county = document.getElementById('filterCounty').value;
  const cat    = document.getElementById('filterCat').value;
  const status = document.getElementById('filterStatus').value;

  let filtered = allLeads.filter(r =>
    (!search || (r.name||'').toLowerCase().includes(search)) &&
    (!county || r.county === county) &&
    (!cat    || r.category === cat) &&
    (!status || r.status === status)
  );

  filtered.sort((a, b) => {
    let av = a[sortCol]??'', bv = b[sortCol]??'';
    if (typeof av==='string') av=av.toLowerCase();
    if (typeof bv==='string') bv=bv.toLowerCase();
    return av<bv ? -sortDir : av>bv ? sortDir : 0;
  });

  if (currentView === 'pipeline') {
    renderPipeline(filtered);
  } else {
    renderTable(filtered);
    document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'flex';
  }
  document.getElementById('countBadge').innerHTML = `<strong>${filtered.length}</strong> of ${allLeads.length} leads`;
}

// ── View toggle (Table / Pipeline) ──
let currentView = localStorage.getItem('contractor_view') || 'table';

function setView(v) {
  currentView = v;
  localStorage.setItem('contractor_view', v);
  document.getElementById('viewTableBtn').classList.toggle('active', v === 'table');
  document.getElementById('viewPipeBtn').classList.toggle('active', v === 'pipeline');
  document.getElementById('tableView').style.display    = v === 'table' ? '' : 'none';
  document.getElementById('pipelineView').style.display = v === 'pipeline' ? '' : 'none';
  applyFilters();
}

const PIPE_STAGES = [
  { id:'new',       title:'New',       color:'#8a8f98', builtin:true },
  { id:'contacted', title:'Contacted', color:'#ffb432', builtin:true },
  { id:'qualified', title:'Qualified', color:'#3dd68c', builtin:true },
  { id:'closed',    title:'Closed',    color:'#f47067', builtin:true },
];

// ── Custom stages (shared with the team via shared_settings.contractor_pipeline_stages) ──
let customStages = [];
async function loadCustomStages() {
  try {
    const { data, error } = await supabaseClient.from('shared_settings').select('contractor_pipeline_stages').eq('id', 1).single();
    if (error) throw error;
    try { customStages = JSON.parse(data?.contractor_pipeline_stages || '[]'); } catch(_) { customStages = []; }
  } catch (e) {
    try { customStages = JSON.parse(localStorage.getItem('contractor_custom_stages') || '[]'); } catch(_) { customStages = []; }
  }
  if (!Array.isArray(customStages)) customStages = [];
}
async function saveCustomStages() {
  localStorage.setItem('contractor_custom_stages', JSON.stringify(customStages));
  // upsert (not update+eq) so it also works if the shared_settings id=1 row doesn't exist yet
  const { error } = await supabaseClient.from('shared_settings').upsert({ id: 1, contractor_pipeline_stages: JSON.stringify(customStages) });
  if (error) console.warn('Custom stages saved to this browser only — add a contractor_pipeline_stages (text) column to shared_settings to share them with the team:', error.message);
}
function getAllStages() { return [...PIPE_STAGES, ...customStages]; }
function populateStatusFilter(){
  const sel = document.getElementById('filterStatus');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Statuses</option>' +
    getAllStages().map(s=>`<option value="${s.id}">${esc(s.title)}</option>`).join('');
  sel.value = getAllStages().some(s=>s.id===cur) ? cur : '';
}

// ── Per-person board layout: column order + which columns are minimized ──
function stageOrderIds() {
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('contractor_stage_order') || '[]'); } catch(e){}
  const ids = getAllStages().map(s => s.id);
  const ordered = saved.filter(id => ids.includes(id));
  ids.forEach(id => { if (!ordered.includes(id)) ordered.push(id); });
  return ordered;
}
function orderedStages() {
  const byId = Object.fromEntries(getAllStages().map(s => [s.id, s]));
  return stageOrderIds().map(id => byId[id]).filter(Boolean);
}
let collapsedStages = new Set((() => { try { return JSON.parse(localStorage.getItem('contractor_stage_collapsed') || '[]'); } catch(e){ return []; } })());
function toggleStageCollapse(id) {
  if (collapsedStages.has(id)) collapsedStages.delete(id); else collapsedStages.add(id);
  localStorage.setItem('contractor_stage_collapsed', JSON.stringify([...collapsedStages]));
  animatePipeline(applyFilters);
}
function moveStage(id, dir) {
  const order = stageOrderIds();
  const i = order.indexOf(id), j = i + dir;
  if (i < 0 || j < 0 || j >= order.length) return;
  [order[i], order[j]] = [order[j], order[i]];
  localStorage.setItem('contractor_stage_order', JSON.stringify(order));
  animatePipeline(applyFilters);
}

// FLIP: capture column positions, re-render, then glide each from old → new.
function animatePipeline(mutate) {
  const wrap = document.querySelector('.pipeline-wrap');
  const first = new Map();
  if (wrap) wrap.querySelectorAll('[data-stage-id]').forEach(el => first.set(el.dataset.stageId, el.getBoundingClientRect()));
  mutate();
  const wrap2 = document.querySelector('.pipeline-wrap');
  if (!wrap2 || !first.size) return;
  wrap2.querySelectorAll('[data-stage-id]').forEach(el => {
    const prev = first.get(el.dataset.stageId);
    const now = el.getBoundingClientRect();
    if (!prev) { el.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 160, easing: 'ease' }); return; }
    const dx = prev.left - now.left, dy = prev.top - now.top;
    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
    el.animate(
      [{ transform: `translate(${dx}px, ${dy}px)` }, { transform: 'translate(0, 0)' }],
      { duration: 240, easing: 'cubic-bezier(.2,.75,.3,1)' }
    );
  });
}

function renderPipeline(rows) {
  const wrap = document.getElementById('pipelineView');
  const baseStages = orderedStages();
  // Safety net: if a lead's stage isn't defined on this browser (a custom stage
  // that hasn't synced here yet), show a "ghost" column so leads never vanish.
  const known = new Set(baseStages.map(s => s.id));
  const ghostIds = [...new Set(rows.map(r => r.status).filter(s => s && s !== 'new' && !known.has(s)))];
  const stages = [...baseStages, ...ghostIds.map(id => ({ id, title: id, color: '#8a8f98', ghost: true }))];
  wrap.innerHTML = `<div class="pipeline-wrap">` + stages.map((st, i) => {
    const cards = rows.filter(r => (r.status || 'new') === st.id);
    if (st.ghost) {
      return `<div class="pipe-col" data-stage-id="${attrEsc(st.id)}" style="--pipe-color:#8a8f98" title="Unrecognized stage (${attrEsc(st.id)}) — drag these leads to a real column to re-file them">
        <div class="pipe-col-head"><span class="t">⚠ Other</span><span class="n">${cards.length}</span></div>
        <div class="pipe-col-body">
          ${cards.length ? cards.map(pipeCard).join('') : '<div class="pipe-empty"></div>'}
        </div>
      </div>`;
    }
    if (collapsedStages.has(st.id)) {
      return `<div class="pipe-col collapsed" data-stage-id="${st.id}" style="--pipe-color:${safeColor(st.color)}" onclick="toggleStageCollapse('${st.id}')" ondragover="pipeDragOver(event)" ondragleave="pipeDragLeave(event)" ondrop="pipeDrop(event,'${st.id}')" title="Expand ${attrEsc(st.title)}">
        <div class="pipe-col-collapsed-inner">
          <span class="cc-count">${cards.length}</span>
          <span class="cc-title">${esc(st.title)}</span>
          <span class="cc-icon">▸</span>
        </div>
      </div>`;
    }
    const canL = i > 0, canR = i < baseStages.length - 1;
    const del = st.builtin ? '' : `<button class="col-btn" onclick="deleteStage('${st.id}')" title="Delete stage" style="color:var(--hot)">✕</button>`;
    return `<div class="pipe-col" data-stage-id="${st.id}" style="--pipe-color:${safeColor(st.color)}">
      <div class="pipe-col-head">
        <span class="t">${esc(st.title)}</span>
        <span class="n">${cards.length}</span>
        <span class="col-actions">
          <button class="col-btn" ${canL?'':'disabled'} onclick="moveStage('${st.id}',-1)" title="Move left">‹</button>
          <button class="col-btn" ${canR?'':'disabled'} onclick="moveStage('${st.id}',1)" title="Move right">›</button>
          <button class="col-btn" onclick="toggleStageCollapse('${st.id}')" title="Minimize">–</button>
          ${del}
        </span>
      </div>
      <div class="pipe-col-body" ondragover="pipeDragOver(event)" ondragleave="pipeDragLeave(event)" ondrop="pipeDrop(event,'${st.id}')">
        ${cards.length ? cards.map(pipeCard).join('') : '<div class="pipe-empty">Drop leads here</div>'}
      </div>
    </div>`;
  }).join('') + `<button class="add-stage-btn" onclick="openStageModal()">＋ Add Stage</button></div>`;
}

function pipeCard(r) {
  const catClass = 'cat-' + (r.category || '');
  const rating = r.rating ? `<span class="stars">★ ${r.rating}</span>` : '';
  const isClaimed = myClaimedIds.has(r.id);
  return `<div class="pipe-card" draggable="true" ondragstart="pipeDragStart(event,'${r.id}')" ondragend="pipeDragEnd(event)">
    <div class="nm">${r.website ? `<a href="${esc(r.website)}" target="_blank">${esc(r.name)}</a>` : esc(r.name)}</div>
    <div class="meta">
      <span class="cat-badge ${catClass}">${CAT_LABELS[r.category] || r.category || '—'}</span>
      <span>${esc(r.county || '')}</span>
      ${rating}
    </div>
    <div class="foot">
      ${r.phone ? `<a href="tel:${attrEsc(r.phone)}">${esc(r.phone)}</a><button class="copy-btn" title="Copy number" onclick="event.stopPropagation();copyText('${jsq(r.phone)}', this)">📋</button>` : ''}
      ${r.email ? `<a href="mailto:${attrEsc(r.email)}">✉️</a>` : ''}
      <button class="claim-btn ${isClaimed?'claimed':''}" style="margin-left:auto" onclick="toggleClaim('${r.id}', this)">${isClaimed?'✓ Claimed':'Claim'}</button>
      <button class="claim-btn" onclick="blacklistLead('${r.id}', this)" title="Denied by contractor — blacklist" style="color:#f2a33c">⛔</button>
    </div>
    <input class="notes-input" data-note-id="${r.id}" draggable="false" placeholder="Add note…" value="${esc(r.notes||'').replace(/"/g,'&quot;')}" onpointerdown="event.stopPropagation(); this.closest('.pipe-card').draggable=false" onblur="this.closest('.pipe-card').draggable=true; saveNote('${r.id}', this.value)"/>
  </div>`;
}

let _dragId = null;
function pipeDragStart(e, id) { _dragId = id; e.dataTransfer.effectAllowed = 'move'; e.target.classList.add('dragging'); }
function pipeDragEnd(e) { e.target.classList.remove('dragging'); }
function pipeDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
function pipeDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function pipeDrop(e, stage) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!_dragId) return;
  const lead = allLeads.find(r => r.id === _dragId);
  _dragId = null;
  if (!lead || (lead.status || 'new') === stage) return;
  await setStatus(lead.id, stage);
}

async function setStatus(id, status) {
  const lead = allLeads.find(r => r.id === id);
  if (!lead) return;
  const prev = lead.status;
  lead.status = status;
  applyFilters();
  const { error } = await supabaseClient.from('contractor_leads').update({ status }).eq('id', id);
  if (error) {
    console.error('setStatus', error);
    lead.status = prev;          // revert so the UI matches the DB
    applyFilters();
    alert('Could not move this lead — the database rejected that stage. If it is a custom stage, the status column may not accept it.');
  }
}

function sortBy(col) {
  if (sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=-1; }
  applyFilters();
}

function renderTable(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(row => {
    const tr = document.createElement('tr');
    const catClass = 'cat-'+(row.category||'');
    const ratingHtml = row.rating
      ? `<span class="stars">★ ${row.rating}</span> <span class="rev-count">(${row.review_count||0})</span>`
      : '<span style="color:var(--muted2)">—</span>';
    const savedDate = row.saved_at ? new Date(row.saved_at).toLocaleDateString() : '—';
    const isClaimed = myClaimedIds.has(row.id);
    const status = row.status || 'new';

    tr.innerHTML = `
      <td><button class="claim-btn ${isClaimed?'claimed':''}" id="claimbtn_${row.id}" onclick="toggleClaim('${row.id}', this)">${isClaimed?'✓ Claimed':'Claim'}</button></td>
      <td class="name">${row.website?`<a href="${esc(row.website)}" target="_blank">${esc(row.name)}</a>`:esc(row.name)}</td>
      <td class="county">${esc(row.county||'')}</td>
      <td><span class="cat-badge ${catClass}">${CAT_LABELS[row.category]||row.category||'—'}</span></td>
      <td>${ratingHtml}</td>
      <td>
        <select class="status-sel st-${status}" onchange="setStatus('${row.id}', this.value)">
          ${getAllStages().some(s=>s.id===status)?'':`<option value="${attrEsc(status)}" selected>${esc(status)} (?)</option>`}
          ${getAllStages().map(s=>`<option value="${s.id}" ${status===s.id?'selected':''}>${esc(s.title)}</option>`).join('')}
        </select>
      </td>
      <td class="phone">${row.phone?`<span class="phone-wrap"><a href="tel:${attrEsc(row.phone)}">${esc(row.phone)}</a><button class="copy-btn" title="Copy number" onclick="copyText('${jsq(row.phone)}', this)">📋</button></span>`:'<span style="color:var(--muted2)">—</span>'}</td>
      <td class="email-cell">${row.email?`<a href="mailto:${attrEsc(row.email)}">${esc(row.email)}</a>`:'<span style="color:var(--muted2)">—</span>'}</td>
      <td class="web">${row.website?`<a href="${attrEsc(row.website)}" target="_blank">${shortUrl(row.website)}</a>`:'<span style="color:var(--muted2)">—</span>'}</td>
      <td class="addr">${esc(row.address||'')}</td>
      <td class="notes-cell"><input class="notes-input" data-note-id="${row.id}" placeholder="Add note…" value="${esc(row.notes||'').replace(/"/g,'&quot;')}" onblur="saveNote('${row.id}', this.value)"/></td>
      <td class="date">${savedDate}</td>
      <td style="white-space:nowrap"><button class="btn btn-sm" onclick="blacklistLead('${row.id}', this)" title="Denied by contractor — blacklist so it never returns in scans" style="color:#f2a33c;border-color:transparent">⛔</button><button class="btn btn-sm btn-danger" onclick="deleteLead('${row.id}', this)" title="Delete (can reappear on re-scan)">✕</button></td>`;
    tbody.appendChild(tr);
  });
}

async function toggleClaim(leadId, btn) {
  const isClaimed = myClaimedIds.has(leadId);
  if (isClaimed) {
    const claimId = claimIdMap[leadId];
    const { error } = await supabaseClient.from('contractor_claims').delete().eq('id', claimId);
    if (!error) {
      myClaimedIds.delete(leadId);
      delete claimIdMap[leadId];
      btn.textContent = 'Claim';
      btn.classList.remove('claimed');
    }
  } else {
    const { data, error } = await supabaseClient.from('contractor_claims')
      .insert({lead_id: leadId, user_id: currentUser.id})
      .select('id').single();
    if (!error) {
      myClaimedIds.add(leadId);
      claimIdMap[leadId] = data.id;
      btn.textContent = '✓ Claimed';
      btn.classList.add('claimed');
    }
  }
}

async function deleteLead(id, btn) {
  if (!confirm('Delete this lead?')) return;
  const { error } = await supabaseClient.from('contractor_leads').delete().eq('id', id);
  if (!error) {
    allLeads = allLeads.filter(r => r.id !== id);
    btn.closest('tr').remove();
    document.getElementById('countBadge').innerHTML = `<strong>${allLeads.length}</strong> leads`;
  }
}

// Blacklist = removed from the shared DB AND never re-added by future scans.
// Use when a contractor declines on a call.
async function blacklistLead(id, btn) {
  const lead = allLeads.find(r => r.id === id);
  if (!lead) return;
  if (!confirm(`Blacklist "${lead.name}"?\nIt will be removed for everyone and won't come back in future scans.`)) return;
  const { error: blErr } = await supabaseClient.from('contractor_blacklist')
    .upsert({ place_id: lead.place_id, name: lead.name, blacklisted_by: currentUser.id },
            { onConflict: 'place_id', ignoreDuplicates: true });
  if (blErr) { alert('Could not blacklist — is the contractor_blacklist table added in Supabase?'); return; }
  await supabaseClient.from('contractor_leads').delete().eq('id', id);
  allLeads = allLeads.filter(r => r.id !== id);
  applyFilters();
}

function exportCSV() {
  if (!allLeads.length) { alert('No leads to export.'); return; }
  const hdrs = ['Company','County','Type','Rating','Reviews','Phone','Email','Website','Address','Saved'];
  const rows = allLeads.map(r => [
    r.name,r.county,CAT_LABELS[r.category]||r.category,r.rating||'',r.review_count||'',
    r.phone,r.email,r.website,r.address,
    r.saved_at?new Date(r.saved_at).toLocaleDateString():''
  ].map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(','));
  const csv = [hdrs.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `contractor_leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function attrEsc(s){ return esc(s).replace(/"/g,'&quot;'); }                 // safe inside a double-quoted HTML attribute
function jsq(s){ return (s||'').toString().replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); } // single-quoted JS string inside a double-quoted attribute
function safeColor(c){ return /^#[0-9a-fA-F]{3,8}$/.test(c||'') ? c : '#8a8f98'; }
function shortUrl(u){ try{ return new URL(u).hostname.replace(/^www\./,''); }catch(e){ return u; } }

// Copy a phone number (or any text) to the clipboard, with quick ✓ feedback.
async function copyText(text, btn){
  try { await navigator.clipboard.writeText(text); }
  catch(e){ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); try{document.execCommand('copy');}catch(_){} ta.remove(); }
  if(btn){
    if(btn._copyTimer) clearTimeout(btn._copyTimer); else btn._copyOrig = btn.textContent;
    btn.textContent='✓'; btn.classList.add('copied');
    btn._copyTimer = setTimeout(()=>{ btn.textContent=btn._copyOrig; btn.classList.remove('copied'); btn._copyTimer=null; }, 1200);
  }
}

// Save a shared note on a contractor lead (visible to the whole team).
async function saveNote(id, value){
  const lead = allLeads.find(r=>r.id===id);
  if(!lead) return;
  const v = value.trim() || null;
  if((lead.notes||null) === v) return; // unchanged
  lead.notes = v;
  const { error } = await supabaseClient.from('contractor_leads').update({ notes: v }).eq('id', id);
  if(error) console.error('saveNote', error);
}

// ── Add / delete custom pipeline stages ──
let _stageColor = '#5e6ad2';
function pickStageColor(el){ document.querySelectorAll('#stageColors .swatch').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); _stageColor = el.dataset.c; }
function openStageModal(){
  _stageColor = '#5e6ad2';
  document.querySelectorAll('#stageColors .swatch').forEach((s,i)=>s.classList.toggle('sel', i===0));
  document.getElementById('stageName').value='';
  document.getElementById('stageModalOverlay').style.display='flex';
  setTimeout(()=>document.getElementById('stageName').focus(), 0);
}
function closeStageModal(){ document.getElementById('stageModalOverlay').style.display='none'; }
async function saveStage(){
  const title = document.getElementById('stageName').value.trim();
  if(!title){ alert('Give the stage a name.'); return; }
  const id = 'cs_' + title.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'') + '_' + Date.now().toString(36);
  customStages.push({ id, title, color:_stageColor });
  await saveCustomStages();
  closeStageModal();
  populateStatusFilter();
  applyFilters();
}
async function deleteStage(id){
  const st = customStages.find(s=>s.id===id);
  if(!st) return;
  const inStage = allLeads.filter(l=>(l.status||'')===id);
  if(!confirm(`Delete stage "${st.title}"?${inStage.length?` ${inStage.length} lead(s) in it will move back to New.`:''}`)) return;
  customStages = customStages.filter(s=>s.id!==id);
  await saveCustomStages();
  if(inStage.length){
    inStage.forEach(l=>l.status='new');
    await supabaseClient.from('contractor_leads').update({status:'new'}).eq('status', id);
  }
  populateStatusFilter();
  applyFilters();
}

// ── Live team sync (always on) ──
// Supabase realtime on contractor_leads so status moves, new scans, and deletes
// from any teammate appear here automatically — no refresh, no toggle.
let _liveTimer = null;
function scheduleLiveRender() {
  clearTimeout(_liveTimer);
  _liveTimer = setTimeout(runLiveRender, 250);
}
function runLiveRender() {
  const a = document.activeElement;
  const isNote = a && a.classList && a.classList.contains('notes-input');
  // A filter box or an open status <select> mid-interaction — defer briefly so we don't disrupt it.
  if (a && /^(INPUT|SELECT|TEXTAREA)$/.test(a.tagName) && !isNote) {
    clearTimeout(_liveTimer);
    _liveTimer = setTimeout(runLiveRender, 1500);
    return;
  }
  // A note being edited: keep the board live, but preserve the in-progress text + caret.
  let restore = null;
  if (isNote) restore = { id: a.dataset.noteId, val: a.value, s: a.selectionStart, e: a.selectionEnd };
  applyFilters();
  if (restore && restore.id) {
    const el = document.querySelector('.notes-input[data-note-id="' + restore.id + '"]');
    if (el) { el.value = restore.val; el.focus(); try { el.setSelectionRange(restore.s, restore.e); } catch(_){} }
  }
}
function startLiveSync() {
  supabaseClient.channel('contractor-leads-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'contractor_leads' }, payload => {
      if (payload.eventType === 'DELETE') {
        const id = payload.old && payload.old.id;
        if (!id) return;
        allLeads = allLeads.filter(r => r.id !== id);
      } else {
        const row = payload.new;
        if (!row || !row.id) return;
        const idx = allLeads.findIndex(r => r.id === row.id);
        if (idx === -1) allLeads.push(row); else allLeads[idx] = { ...allLeads[idx], ...row };
      }
      scheduleLiveRender();
    })
    .subscribe();
}

(async function init(){
  await requireAuth();
  document.getElementById('userLabel').textContent = await getUserName();
  try { await loadCustomStages(); } catch(e){ console.warn('custom stages load failed', e); customStages = []; }
  populateStatusFilter();
  await loadLeads();
  setView(currentView);
  startLiveSync();
})();
</script>

  <div class="modal">
    <button class="modal-close" onclick="closeStageModal()">✕</button>
    <h3>New Pipeline Stage</h3>
    <label>Stage name
      <input id="stageName" placeholder="e.g. Follow Up, Quoted, Booked" onkeydown="if(event.key==='Enter')saveStage()"/>
    </label>

      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Color</div>

        <span class="swatch sel" data-c="#5e6ad2" style="background:#5e6ad2" onclick="pickStageColor(this)"></span>
        <span class="swatch" data-c="#f2a33c" style="background:#f2a33c" onclick="pickStageColor(this)"></span>
        <span class="swatch" data-c="#3dd68c" style="background:#3dd68c" onclick="pickStageColor(this)"></span>
        <span class="swatch" data-c="#f47067" style="background:#f47067" onclick="pickStageColor(this)"></span>
        <span class="swatch" data-c="#38bdf8" style="background:#38bdf8" onclick="pickStageColor(this)"></span>
        <span class="swatch" data-c="#e879f9" style="background:#e879f9" onclick="pickStageColor(this)"></span>
      </div>

    <button class="btn btn-accent" onclick="saveStage()">＋ Create Stage</button>
  </div>
</div>
