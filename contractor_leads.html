<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LeadScout — Contractor Leads</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0c0e;--surface:#101114;--surface2:#16181c;--surface3:#1d2025;
  --border:#24272e;--border-light:#31353e;
  --text:#e7e9ee;--muted:#8a8f98;--muted2:#5e646e;
  --accent:#5e6ad2;--accent-hover:#7c87e0;--hot:#f47067;
  --green:#2a6b4a;--green-light:#3dd68c;
  --focus-ring:0 0 0 3px rgba(94,106,210,.28);
  --radius:10px;--radius-sm:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;}
header{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:18px;font-weight:800;letter-spacing:-.02em;white-space:nowrap;}
.logo span{background:linear-gradient(135deg,var(--accent),#8b96e8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.logo sub{font-size:10px;font-weight:600;color:var(--green-light);-webkit-text-fill-color:var(--green-light);margin-left:4px;vertical-align:middle;}
.btn{padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-accent:hover{background:var(--accent-hover);border-color:var(--accent-hover);color:#fff;}
.btn-green{background:var(--green);border-color:var(--green);color:#fff;}
.btn-green:hover{background:#1e5438;border-color:#1e5438;color:#fff;}
.btn-sm{padding:4px 8px;font-size:11px;}
.layout{display:flex;flex:1;overflow:hidden;}

/* Left panel */
.panel{width:320px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-top{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.panel-top h3{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.type-chip{padding:7px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;text-align:center;transition:all .15s;}
.type-chip:hover{border-color:var(--accent);color:var(--text);}
.type-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Map */
.map-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center;}
#flMap{width:100%;height:100%;}
.county-path{fill:var(--surface3);stroke:var(--border-light);stroke-width:0.5;cursor:pointer;transition:fill .12s;}
.county-path:hover{fill:#252830;}
.county-path.selected{fill:rgba(94,106,210,.45);stroke:#5e6ad2;stroke-width:1;}
.county-path.scanned{fill:rgba(61,214,140,.12);stroke:#3dd68c;stroke-width:0.8;}
.county-path.selected.scanned{fill:rgba(94,106,210,.45);stroke:#5e6ad2;stroke-width:1;}
.county-path.all-scanned{fill:rgba(61,214,140,.18);stroke:#3dd68c;stroke-width:1;}
#mapTooltip{position:absolute;background:rgba(16,17,20,.95);border:1px solid var(--border-light);border-radius:6px;padding:6px 10px;font-size:11px;pointer-events:none;display:none;z-index:10;white-space:nowrap;}
#mapTooltip .tt-name{font-weight:700;color:var(--text);margin-bottom:3px;}
#mapTooltip .tt-status{color:var(--muted);font-size:10px;}
#mapLoading{position:absolute;color:var(--muted);font-size:12px;}

/* Map legend + controls */
.map-footer{padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0;}
.legend{display:flex;gap:12px;margin-bottom:7px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.leg-dot{width:10px;height:10px;border-radius:2px;border:1px solid;}
.map-btns{display:flex;gap:6px;margin-bottom:8px;}
.force-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.force-row input{accent-color:var(--accent);}

/* Scan controls */
.scan-controls{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;}
.radius-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-bottom:8px;}
.radius-row input{flex:1;accent-color:var(--accent);}
.radius-val{min-width:32px;text-align:right;color:var(--text);font-weight:600;}
.progress-wrap{display:none;flex-direction:column;gap:4px;margin-top:6px;}
.progress-bar-outer{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.progress-bar-inner{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
.progress-text{font-size:11px;color:var(--muted);}

/* Main results */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.result-count{font-size:12px;color:var(--muted);flex:1;}
.result-count strong{color:var(--text);}
.table-wrap{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{position:sticky;top:0;background:var(--surface);padding:9px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:hover{background:var(--surface2);}
tbody td{padding:9px 12px;vertical-align:top;}
td.name{font-weight:600;color:var(--text);max-width:180px;}
td.county{color:var(--muted);white-space:nowrap;}
td.cat .cat-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.cat-roofing{background:rgba(244,112,103,.15);color:#f47067;}
.cat-windows{background:rgba(94,106,210,.15);color:#8b96e8;}
.cat-shutters{background:rgba(61,214,140,.15);color:#3dd68c;}
.cat-hvac{background:rgba(255,180,50,.15);color:#ffb432;}
td.phone a{color:var(--text);text-decoration:none;}
td.phone a:hover{color:var(--accent);}
td.email-cell{max-width:180px;word-break:break-all;}
td.email-cell a{color:var(--accent);text-decoration:none;font-size:11px;}
td.web a{color:var(--accent);text-decoration:none;font-size:11px;max-width:140px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td.addr{color:var(--muted);font-size:11px;max-width:160px;}
td.actions{white-space:nowrap;}
.saved-badge{font-size:10px;color:var(--green-light);font-weight:600;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);}
.empty-state .icon{font-size:40px;opacity:.4;}
.empty-state p{font-size:13px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px;}
</style>
</head>
<body>
<header>
  <div class="logo">Lead<span>Scout</span> <sub>CONTRACTORS</sub></div>
  <a href="/" style="text-decoration:none"><button class="btn btn-sm">← Restaurants</button></a>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <span id="userLabel" style="font-size:11px;color:var(--muted)"></span>
    <button class="btn btn-sm" onclick="signOut()">Sign Out</button>
  </div>
</header>

<div class="layout">
  <aside class="panel">
    <div class="panel-top">
      <h3>What to find</h3>
      <div class="type-grid">
        <button class="type-chip active" data-type="roofing" onclick="toggleType(this)">🏠 Roofing</button>
        <button class="type-chip active" data-type="windows" onclick="toggleType(this)">🪟 Windows</button>
        <button class="type-chip" data-type="shutters" onclick="toggleType(this)">🌀 Storm Shutters</button>
        <button class="type-chip" data-type="hvac" onclick="toggleType(this)">❄️ HVAC</button>
      </div>
    </div>

    <div class="map-wrap">
      <svg id="flMap" viewBox="0 0 300 380" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="mapTooltip">
        <div class="tt-name" id="ttName"></div>
        <div class="tt-status" id="ttStatus"></div>
      </div>
      <div id="mapLoading">Loading map…</div>
    </div>

    <div class="map-footer">
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:rgba(94,106,210,.45);border-color:#5e6ad2"></div> Selected</div>
        <div class="leg-item"><div class="leg-dot" style="background:rgba(61,214,140,.18);border-color:#3dd68c"></div> Already scanned</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--surface3);border-color:var(--border-light)"></div> Not scanned</div>
      </div>
      <div class="map-btns">
        <button class="btn btn-sm" onclick="selectAll()">Select All</button>
        <button class="btn btn-sm" onclick="clearSelection()">Clear</button>
        <button class="btn btn-sm" onclick="clearScanCache()" style="margin-left:auto;color:var(--muted)">Reset cache</button>
      </div>
      <div class="force-row">
        <input type="checkbox" id="forceRescan"/>
        <label for="forceRescan">Re-scan already scanned counties</label>
      </div>
    </div>

    <div class="scan-controls">
      <div class="radius-row">
        <span>Search radius</span>
        <input type="range" id="radiusSlider" min="10" max="50" value="25" step="5" oninput="document.getElementById('radiusVal').textContent=this.value+'km'"/>
        <span class="radius-val" id="radiusVal">25km</span>
      </div>
      <button class="btn btn-green" id="scanBtn" style="width:100%;padding:10px;font-size:13px;" onclick="startScan()">Scan Selected Counties</button>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
        <div class="progress-text" id="progressText">Starting…</div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <span class="result-count" id="resultCount">Click counties on the map, then Scan</span>
      <button class="btn btn-sm" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-sm btn-green" onclick="saveAll()">Save All</button>
    </div>
    <div class="table-wrap">
      <div class="empty-state" id="emptyState">
        <div class="icon">🏠</div>
        <p>Click counties on the Florida map, then hit Scan</p>
      </div>
      <table id="resultsTable" style="display:none">
        <thead>
          <tr>
            <th>Company</th><th>County</th><th>Type</th><th>Phone</th>
            <th>Email</th><th>Website</th><th>Address</th><th></th>
          </tr>
        </thead>
        <tbody id="resultsTbody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>

// ── Florida county centroids (for API searching) ──

  {name:'Lake',lat:28.7694,lng:-81.7718},{name:'Pasco',lat:28.3062,lng:-82.4346},

  {name:'Highlands',lat:27.3433,lng:-81.3404},{name:'Okeechobee',lat:27.3944,lng:-80.8316},
  {name:'Brevard',lat:28.2639,lng:-80.7214},{name:'Indian River',lat:27.6891,lng:-80.5463},
  {name:'St. Lucie',lat:27.3734,lng:-80.4379},{name:'Martin',lat:27.0715,lng:-80.3876},
  {name:'Sarasota',lat:27.1847,lng:-82.3679},{name:'Charlotte',lat:26.9342,lng:-81.9447},
  {name:'De Soto',lat:27.1876,lng:-81.8244},{name:'Glades',lat:26.9558,lng:-81.2067},
  {name:'Hendry',lat:26.4985,lng:-81.2393},{name:'Lee',lat:26.5629,lng:-81.7068},
  {name:'Collier',lat:26.1148,lng:-81.3973},{name:'Palm Beach',lat:26.6463,lng:-80.3995},
  {name:'Broward',lat:26.122,lng:-80.3972},{name:'Miami-Dade',lat:25.5516,lng:-80.6327},
  {name:'Monroe',lat:25.0,lng:-81.0},
];
const COUNTY_BY_NAME = Object.fromEntries(FL_COUNTIES.map(c => [c.name, c]));

// Florida county FIPS → county name
const FIPS_TO_COUNTY = {
  '12001':'Alachua','12003':'Baker','12005':'Bay','12007':'Bradford',
  '12009':'Brevard','12011':'Broward','12013':'Calhoun','12015':'Charlotte',
  '12017':'Citrus','12019':'Clay','12021':'Collier','12023':'Columbia',
  '12027':'De Soto','12029':'Dixie','12031':'Duval','12033':'Escambia',
  '12035':'Flagler','12037':'Franklin','12039':'Gadsden','12041':'Gilchrist',
  '12043':'Glades','12045':'Gulf','12047':'Hamilton','12049':'Hardee',
  '12051':'Hendry','12053':'Hernando','12055':'Highlands','12057':'Hillsborough',
  '12059':'Holmes','12061':'Indian River','12063':'Jackson','12065':'Jefferson',
  '12067':'Lafayette','12069':'Lake','12071':'Lee','12073':'Leon',
  '12075':'Levy','12077':'Liberty','12079':'Madison','12081':'Manatee',
  '12083':'Marion','12085':'Martin','12086':'Miami-Dade','12087':'Monroe',
  '12089':'Nassau','12091':'Okaloosa','12093':'Okeechobee','12095':'Orange',
  '12097':'Osceola','12099':'Palm Beach','12101':'Pasco','12103':'Pinellas',
  '12105':'Polk','12107':'Putnam','12109':'St. Johns','12111':'St. Lucie',
  '12113':'Santa Rosa','12115':'Sarasota','12117':'Seminole','12119':'Sumter',
  '12121':'Suwannee','12123':'Taylor','12125':'Union','12127':'Volusia',
  '12129':'Wakulla','12131':'Walton','12133':'Washington',
};

const SEARCH_KEYWORDS = {
  roofing:'roofing contractor',
  windows:'window replacement company',
  shutters:'hurricane shutters',
  hvac:'HVAC contractor',
};
const CAT_LABELS = {roofing:'Roofing',windows:'Windows',shutters:'Storm Shutters',hvac:'HVAC'};

// ── State ──
let results = [];
let seenIds = new Set();
let selectedCounties = new Set();
let scanning = false;
let stopFlag = false;
let apiKey = null;
let pathEls = {}; // countyName → SVG path element

// ── Scan cache (localStorage, resets monthly) ──
function scanKey(county, type) {
  const d = new Date();
  return `cl_${county}_${type}_${d.getFullYear()}_${d.getMonth()}`;
}
function markScanned(county, type) {
  localStorage.setItem(scanKey(county, type), '1');
  updateCountyAppearance(county);
}
function isScanned(county, type) {
  return !!localStorage.getItem(scanKey(county, type));
}
function allTypesScanned(county) {
  return getSelectedTypes().every(t => isScanned(county, t));
}
function clearScanCache() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith('cl_'));
  keys.forEach(k => localStorage.removeItem(k));
  Object.keys(pathEls).forEach(name => updateCountyAppearance(name));
  alert('Scan cache cleared — all counties will be re-scanned.');
}

// ── Map ──
async function loadMap() {
  try {
    const topo = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json').then(r => r.json());
    const allCounties = topojson.feature(topo, topo.objects.counties);
    const flFeatures = allCounties.features.filter(f => {
      const fips = String(f.id).padStart(5, '0');
      return fips.startsWith('12');
    });

    // Simple Mercator projection fitted to Florida bounds
    // Florida: lng -87.6 to -80.0, lat 24.4 to 31.1
    const W = 300, H = 380;
    const minLng = -87.7, maxLng = -79.9, minLat = 24.3, maxLat = 31.2;
    const scaleX = W / (maxLng - minLng);
    const scaleY = H / (maxLat - minLat);
    const scale = Math.min(scaleX, scaleY) * 0.92;
    const offX = (W - (maxLng - minLng) * scale) / 2;
    const offY = (H - (maxLat - minLat) * scale) / 2;

    function project([lng, lat]) {
      return [offX + (lng - minLng) * scale, offY + (maxLat - lat) * scale];
    }

    function coordsToPath(coords) {
      return coords.map((ring, ri) =>
        ring.map((pt, i) => {
          const [x, y] = project(pt);
          return (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2);
        }).join(' ') + ' Z'
      ).join(' ');
    }

    function featureToD(feature) {
      const geo = feature.geometry;
      if (!geo) return '';
      if (geo.type === 'Polygon') return coordsToPath(geo.coordinates);
      if (geo.type === 'MultiPolygon') return geo.coordinates.map(coordsToPath).join(' ');
      return '';
    }

    const svg = document.getElementById('flMap');
    svg.innerHTML = '';

    flFeatures.forEach(feature => {
      const fips = String(feature.id).padStart(5, '0');
      const countyName = FIPS_TO_COUNTY[fips];
      if (!countyName) return;
      const d = featureToD(feature);
      if (!d) return;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('data-county', countyName);
      path.className.baseVal = 'county-path';
      pathEls[countyName] = path;

      path.addEventListener('click', () => toggleCounty(countyName));
      path.addEventListener('mouseenter', e => showTooltip(e, countyName));
      path.addEventListener('mouseleave', hideTooltip);

      svg.appendChild(path);
      updateCountyAppearance(countyName);
    });

    document.getElementById('mapLoading').style.display = 'none';
  } catch(e) {
    document.getElementById('mapLoading').textContent = 'Map failed to load.';
  }
}

function updateCountyAppearance(countyName) {
  const el = pathEls[countyName];
  if (!el) return;
  const sel = selectedCounties.has(countyName);
  const types = getSelectedTypes();
  const anyScanned = types.some(t => isScanned(countyName, t));
  const allScanned = types.length > 0 && types.every(t => isScanned(countyName, t));

  el.className.baseVal = 'county-path' +
    (sel ? ' selected' : '') +
    (allScanned ? ' all-scanned' : anyScanned ? ' scanned' : '');
}

function toggleCounty(name) {
  if (selectedCounties.has(name)) selectedCounties.delete(name);
  else selectedCounties.add(name);
  updateCountyAppearance(name);
}

function selectAll() {
  FL_COUNTIES.forEach(c => selectedCounties.add(c.name));
  Object.keys(pathEls).forEach(updateCountyAppearance);
}

function clearSelection() {
  selectedCounties.clear();
  Object.keys(pathEls).forEach(updateCountyAppearance);
}

function showTooltip(e, countyName) {
  const tt = document.getElementById('mapTooltip');
  const types = getSelectedTypes();
  const statusLines = types.map(t => {
    const done = isScanned(countyName, t);
    return `${done ? '✓' : '○'} ${CAT_LABELS[t]}`;
  });
  document.getElementById('ttName').textContent = countyName + ' County';
  document.getElementById('ttStatus').innerHTML = statusLines.join('&nbsp;&nbsp;') || 'Select a type above';
  const wrap = document.querySelector('.map-wrap');
  const rect = wrap.getBoundingClientRect();
  const x = e.clientX - rect.left + 8;
  const y = e.clientY - rect.top + 8;
  tt.style.left = Math.min(x, rect.width - 160) + 'px';
  tt.style.top = Math.min(y, rect.height - 60) + 'px';
  tt.style.display = 'block';
}

function hideTooltip() {
  document.getElementById('mapTooltip').style.display = 'none';
}

// ── Type chips ──
function toggleType(btn) {
  btn.classList.toggle('active');
  // Refresh map colors
  Object.keys(pathEls).forEach(updateCountyAppearance);
}

function getSelectedTypes() {
  return [...document.querySelectorAll('.type-chip.active')].map(b => b.dataset.type);
}

// ── Scan ──
async function startScan() {
  if (scanning) { stopFlag = true; return; }

  const types = getSelectedTypes();
  if (!types.length) { alert('Select at least one type above the map.'); return; }
  if (!selectedCounties.size) { alert('Click counties on the map to select them.'); return; }

  const force = document.getElementById('forceRescan').checked;
  const countiesToScan = [...selectedCounties]
    .map(name => COUNTY_BY_NAME[name])
    .filter(Boolean)
    .filter(c => force || types.some(t => !isScanned(c.name, t)));

  if (!countiesToScan.length) {
    alert('All selected counties have already been scanned for the chosen types.\nCheck "Re-scan already scanned counties" to run again.');
    return;
  }

  if (!apiKey) {
    const { data } = await supabaseClient.from('shared_settings').select('google_key').eq('id',1).single();
    apiKey = data?.google_key;
    if (!apiKey) { alert('No Google Maps API key found. Add it in the main app Settings.'); return; }
  }

  scanning = true;
  stopFlag = false;
  document.getElementById('scanBtn').textContent = '⏹ Stop';
  document.getElementById('progressWrap').style.display = 'flex';

  const radius = parseInt(document.getElementById('radiusSlider').value) * 1000;
  const jobs = [];
  countiesToScan.forEach(c => types.forEach(t => {
    if (force || !isScanned(c.name, t)) jobs.push({county: c, type: t});
  }));

  for (let i = 0; i < jobs.length; i++) {
    if (stopFlag) break;
    const {county, type} = jobs[i];
    setProgress(i, jobs.length, `Scanning ${county.name} — ${CAT_LABELS[type]}…`);
    await scanCounty(county, type, SEARCH_KEYWORDS[type], radius);
    markScanned(county.name, type);
    await sleep(300);
  }

  scanning = false;
  stopFlag = false;
  document.getElementById('scanBtn').textContent = 'Scan Selected Counties';
  setProgress(jobs.length, jobs.length, `Done — ${results.length} companies found`);
}

async function scanCounty(county, type, keyword, radius) {
  try {
    const r = await fetch(`/nearbysearch?lat=${county.lat}&lng=${county.lng}&radius=${radius}&keyword=${encodeURIComponent(keyword)}&key=${encodeURIComponent(apiKey)}`);
    const data = await r.json();
    if (!data.results) return;
    for (const place of data.results) {
      if (stopFlag) return;
      if (seenIds.has(place.place_id)) continue;
      seenIds.add(place.place_id);

      let phone = '', website = '', address = place.vicinity || '';
      try {
        const dr = await fetch(`/placedetails?place_id=${encodeURIComponent(place.place_id)}&key=${encodeURIComponent(apiKey)}`);
        const dd = await dr.json();
        phone   = dd.result?.formatted_phone_number || '';
        website = dd.result?.website || '';
        address = dd.result?.formatted_address || address;
      } catch(e) {}

      const row = {place_id:place.place_id, name:place.name, county:county.name, category:type, phone, email:null, website, address, saved:false};
      results.push(row);
      renderRow(row);
      updateCount();
      if (website) scrapeEmailAsync(row);
      await sleep(100);
    }
  } catch(e) { console.error('scanCounty:', e); }
}

async function scrapeEmailAsync(row) {
  try {
    const r = await fetch(`/scrape-email?website=${encodeURIComponent(row.website)}`);
    const d = await r.json();
    row.email = d.primary || null;
    const td = document.getElementById('email_' + row.place_id);
    if (td) td.innerHTML = row.email
      ? `<a href="mailto:${row.email}">${row.email}</a>`
      : '<span style="color:var(--muted2)">—</span>';
  } catch(e) {}
}

// ── Render ──
function renderRow(row) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultsTable').style.display = '';
  const tr = document.createElement('tr');
  tr.id = 'row_' + row.place_id;
  const catClass = 'cat-' + row.category;
  tr.innerHTML = `
    <td class="name">${esc(row.name)}</td>
    <td class="county">${esc(row.county)}</td>
    <td class="cat"><span class="cat-badge ${catClass}">${CAT_LABELS[row.category]||row.category}</span></td>
    <td class="phone">${row.phone?`<a href="tel:${row.phone}">${esc(row.phone)}</a>`:'<span style="color:var(--muted2)">—</span>'}</td>
    <td class="email-cell" id="email_${row.place_id}"><span style="color:var(--muted);font-size:11px;font-style:italic">finding…</span></td>
    <td class="web">${row.website?`<a href="${esc(row.website)}" target="_blank">${shortUrl(row.website)}</a>`:'<span style="color:var(--muted2)">—</span>'}</td>
    <td class="addr">${esc(row.address)}</td>
    <td class="actions"><button class="btn btn-sm" id="savebtn_${row.place_id}" onclick="saveRow('${row.place_id}')">Save</button></td>`;
  document.getElementById('resultsTbody').appendChild(tr);
  if (!row.website) {
    const td = document.getElementById('email_' + row.place_id);
    if (td) td.innerHTML = '<span style="color:var(--muted2)">—</span>';
  }
}

function updateCount() {
  document.getElementById('resultCount').innerHTML = `<strong>${results.length}</strong> companies found`;
}

function setProgress(done, total, text) {
  document.getElementById('progressBar').style.width = `${Math.round((done/total)*100)}%`;
  document.getElementById('progressText').textContent = text;
}

// ── Save ──
async function saveRow(placeId) {
  const row = results.find(r => r.place_id === placeId);
  if (!row || row.saved) return;
  try {
    const { error } = await supabaseClient.from('contractor_leads').upsert({
      place_id:row.place_id, name:row.name, county:row.county, category:row.category,
      phone:row.phone, email:row.email, website:row.website, address:row.address,
      user_id:currentUser.id,
    }, {onConflict:'place_id'});
    if (error) throw error;
    row.saved = true;
    const btn = document.getElementById('savebtn_' + placeId);
    if (btn) btn.outerHTML = '<span class="saved-badge">✓ Saved</span>';
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function saveAll() {
  const unsaved = results.filter(r => !r.saved);
  if (!unsaved.length) { alert('Nothing new to save.'); return; }
  for (const row of unsaved) await saveRow(row.place_id);
  alert(`Saved ${unsaved.length} companies.`);
}

function exportCSV() {
  if (!results.length) { alert('No results to export.'); return; }
  const hdrs = ['Company','County','Type','Phone','Email','Website','Address'];
  const rows = results.map(r => [r.name,r.county,CAT_LABELS[r.category]||r.category,r.phone,r.email||'',r.website,r.address].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = [hdrs.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `contractor_leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Helpers ──
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function shortUrl(u){ try{ return new URL(u).hostname.replace(/^www\./,''); }catch(e){ return u; } }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ── Init ──
(async function init(){
  await requireAuth();
  document.getElementById('userLabel').textContent = await getUserName();
  await loadMap();
})();
</script>
