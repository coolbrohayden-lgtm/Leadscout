<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LeadScout — Database</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2230;--border:#2a3040;
  --text:#e6edf3;--muted:#7d8590;--accent:#6c63ff;
  --hot:#ff5f5f;--warm:#f5a623;--cold:#4ade80;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;}
.logo{font-size:15px;font-weight:700;}.logo span{color:var(--accent);}
.back-btn{font-size:12px;color:var(--muted);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:6px;transition:.15s;}
.back-btn:hover{color:var(--text);border-color:var(--accent);}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{padding:5px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);}
.btn:hover{opacity:.8;}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-danger{background:rgba(255,95,95,.15);border-color:var(--hot);color:var(--hot);}

/* Stats bar */
.stats-bar{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.stat-pill{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;text-align:center;min-width:90px;}
.stat-pill .v{font-size:22px;font-weight:700;}
.stat-pill .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.stat-pill.hot .v{color:var(--hot);}
.stat-pill.warm .v{color:var(--warm);}
.stat-pill.cold .v{color:var(--cold);}
.stat-pill.signed .v{color:#6c63ff;}

/* Controls */
.controls{display:flex;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap;}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 10px;outline:none;width:220px;}
.search-box:focus{border-color:var(--accent);}
.filter-chips{display:flex;gap:5px;flex-wrap:wrap;}
.fchip{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.15s;}
.fchip:hover{border-color:var(--accent);color:var(--text);}
.fchip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.fchip.fc-hot.active{background:var(--hot);border-color:var(--hot);}
.fchip.fc-warm.active{background:var(--warm);border-color:var(--warm);}
.fchip.fc-cold.active{background:var(--cold);border-color:var(--cold);}
.fchip.fc-signed.active{background:#6c63ff;border-color:#6c63ff;}
.fchip.fc-denied.active{background:#444;border-color:#666;color:#aaa;}
.sort-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:4px 8px;outline:none;}

/* Table */
.table-wrap{overflow-x:auto;padding:0 20px 20px;}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;}
th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:7px 10px;border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text);}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:hover td{background:var(--surface2);}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;}
.badge-hot{background:rgba(255,95,95,.2);color:var(--hot);}
.badge-warm{background:rgba(245,166,35,.2);color:var(--warm);}
.badge-cold{background:rgba(74,222,128,.15);color:var(--cold);}
.badge-new{background:var(--surface2);color:var(--muted);}
.badge-contacted{background:rgba(108,99,255,.2);color:#a09aff;}
.badge-interested{background:rgba(245,166,35,.15);color:var(--warm);}
.badge-signed{background:rgba(74,222,128,.15);color:var(--cold);}
.badge-denied{background:rgba(100,100,100,.15);color:#888;}

/* Social pills */
.pill{display:inline-flex;align-items:center;gap:3px;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600;text-decoration:none;margin:1px;}
.pill-ig{background:rgba(200,80,192,.15);border:1px solid rgba(200,80,192,.4);color:#c850c0;}
.pill-tt{background:rgba(105,201,208,.15);border:1px solid rgba(105,201,208,.4);color:#69C9D0;}
.pill-fb{background:rgba(66,103,178,.15);border:1px solid rgba(66,103,178,.4);color:#6080c8;}
.pill-dim{opacity:.35;}

/* Status select */
.status-sel{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;padding:2px 5px;cursor:pointer;outline:none;}

/* Notes */
.notes-input{background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--text);font-size:11px;width:140px;outline:none;padding:2px 0;}
.notes-input:focus{border-bottom-color:var(--accent);}
.notes-input::placeholder{color:var(--muted);}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;line-height:1.8;}

/* Posts popup */
.posts-popup{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;min-width:220px;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.5);font-size:11px;}
.posts-popup h4{font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.posts-popup h4 span{color:var(--muted);font-weight:400;}
.posts-popup .prow{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);}
.posts-popup .prow:last-child{border-bottom:none;}
.posts-popup .pdate{color:var(--muted);min-width:40px;}
.posts-popup .pstats{display:flex;gap:8px;color:var(--text);}
.posts-popup .pstat{display:flex;align-items:center;gap:2px;}
.posts-popup .close-x{cursor:pointer;color:var(--muted);font-size:14px;line-height:1;}
.posts-popup .close-x:hover{color:var(--text);}
.posts-btn{background:none;border:none;cursor:pointer;font-size:10px;color:var(--muted);padding:0 2px;line-height:1;vertical-align:middle;}
.posts-btn:hover{color:var(--text);}

/* Script modal */
.script-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;}
.script-modal{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;max-width:580px;width:90%;max-height:80vh;overflow-y:auto;position:relative;}
.script-modal h3{margin:0 0 4px 0;font-size:15px;}
.script-modal .script-meta{font-size:11px;color:var(--muted);margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;}
.script-modal .script-meta span{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;}
.script-modal .script-section{margin-bottom:16px;}
.script-modal .script-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 6px 0;}
.script-modal .script-body{font-size:13px;line-height:1.6;white-space:pre-wrap;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px 14px;}
.script-modal .script-close{position:absolute;top:14px;right:16px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);}
.script-modal .script-close:hover{color:var(--text);}
.script-modal .copy-btn{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:6px 14px;font-size:12px;cursor:pointer;margin-top:10px;}
.script-modal .copy-btn:hover{opacity:.85;}
.script-stat-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.script-stat-pill{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;text-align:center;}
.script-stat-pill b{display:block;font-size:15px;color:var(--accent);}

/* Blacklist section toggle */
.section-toggle{font-size:11px;color:var(--muted);cursor:pointer;padding:8px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.section-toggle:hover{color:var(--text);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/auth.js"></script>
</head>
<body>

<header>
  <div class="logo">Lead<span>Scout</span></div>
  <a href="/" class="back-btn">← Back to Map</a>
  <div class="hdr-right">
    <button class="btn" onclick="toggleAutoRefresh()" style="display:flex;align-items:center;gap:5px"><span id="refreshDot" style="width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block"></span>Live</button>
    <span id="refreshBadge" style="font-size:10px;color:var(--cold);opacity:0;transition:opacity .4s"></span>
    <button class="btn" onclick="exportCSV()">Export CSV</button>
    <button class="btn" onclick="toggleSettings()" id="settingsBtn" style="display:none"></button>
    <button class="btn btn-danger" onclick="clearDenied()">Clear Denied</button>
    <button class="btn btn-danger" onclick="clearAll()">🗑 Clear All</button>
  </div>
    <span id="userLabel" style="font-size:11px;color:var(--muted);white-space:nowrap"></span>
    <button class="btn" style="font-size:11px" onclick="signOut()">Sign Out</button>
  </header>
  <div id="settingsPanel" style="display:none;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap;align-items:center">
    <label style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;display:flex;flex-direction:column;gap:4px">Apollo.io API Key (for owner lookup)<input id="apolloKeyInput" type="password" placeholder="Apollo API key" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 10px;outline:none;width:280px"/></label>
    <label style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;display:flex;flex-direction:column;gap:4px">RapidAPI Key (IG fallback)<input id="rapidApiKeyInput" type="password" placeholder="RapidAPI key" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 10px;outline:none;width:280px"/></label>
  </div>

<div class="stats-bar" id="statsBar"></div>

<div class="controls">
  <input class="search-box" id="searchBox" placeholder="Search by name, address, notes…" oninput="render()"/>
  <div class="filter-chips" style="margin-bottom:4px">
    <span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-right:2px">LABEL</span>
    <button class="fchip active" data-f="all" onclick="setFilter('all')">All</button>
    <button class="fchip fc-hot"  data-f="HOT"  onclick="setFilter('HOT')">🔥 HOT</button>
    <button class="fchip fc-warm" data-f="WARM" onclick="setFilter('WARM')">WARM</button>
    <button class="fchip fc-cold" data-f="COLD" onclick="setFilter('COLD')">COLD</button>
  </div>
  <div class="filter-chips" style="margin-bottom:4px">
    <span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-right:2px">STATUS</span>
    <button class="fchip" data-f="new"        onclick="setFilter('new')">🆕 New</button>
    <button class="fchip fc-signed"   data-f="signed"    onclick="setFilter('signed')">✅ Signed</button>
    <button class="fchip"             data-f="contacted" onclick="setFilter('contacted')">📞 Contacted</button>
    <button class="fchip"             data-f="interested" onclick="setFilter('interested')">👀 Interested</button>
    <button class="fchip fc-denied"   data-f="denied"    onclick="setFilter('denied')">🚫 Denied</button>
  </div>
  <div class="filter-chips" style="margin-bottom:4px" id="bizTypeFilterRow">
    <span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-right:2px">TYPE</span>
    <button class="fchip active" data-f="type_all" onclick="setBizFilter('all')">All Types</button>
  </div>
  <div class="filter-chips" style="margin-bottom:4px">
    <span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-right:2px">SOCIAL</span>
    <button class="fchip" data-f="no_ig"      onclick="setFilter('no_ig')">No Instagram</button>
    <button class="fchip" data-f="has_ig"     onclick="setFilter('has_ig')">Has Instagram</button>
    <button class="fchip" data-f="ig_small"   onclick="setFilter('ig_small')">IG &lt; 1k</button>
    <button class="fchip" data-f="ig_mid"     onclick="setFilter('ig_mid')">IG 1k–10k</button>
    <button class="fchip" data-f="no_tt"      onclick="setFilter('no_tt')">No TikTok</button>
    <button class="fchip" data-f="has_tt"     onclick="setFilter('has_tt')">Has TikTok</button>
    <button class="fchip" data-f="no_social"  onclick="setFilter('no_social')">No Social At All</button>
    <button class="fchip" data-f="no_website" onclick="setFilter('no_website')">No Website</button>
    <button class="fchip" data-f="has_phone"  onclick="setFilter('has_phone')">Has Phone</button>
  </div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <select class="sort-sel" id="locationSel" onchange="render()">
      <option value="">📍 All locations</option>
    </select>
    <select class="sort-sel" id="sortSel" onchange="render()">
      <option value="score_desc">Score ↓</option>
      <option value="score_asc">Score ↑</option>
      <option value="name_asc">Name A–Z</option>
      <option value="date_desc">Scanned (newest)</option>
      <option value="status">Status</option>
    </select>
    <select class="sort-sel" id="minScoreSel" onchange="render()">
      <option value="0">Min score: any</option>
      <option value="50">Min score: 50</option>
      <option value="70">Min score: 70 (WARM+)</option>
      <option value="100">Min score: 100</option>
      <option value="130">Min score: 130 (HOT+)</option>
    </select>
    <span id="countLabel" style="font-size:11px;color:var(--muted);margin-left:4px;"></span>
  </div>
</div>

<div class="table-wrap">
  <div id="tableContainer"></div>
</div>

<div class="section-toggle" id="blacklistToggle" onclick="toggleBlacklist()" style="display:none">
  ▶ Show blacklisted places (<span id="blCount">0</span>)
</div>
<div id="blacklistSection" style="display:none;padding:0 20px 20px;"></div>

<div id="postsPopup" class="posts-popup" style="display:none"></div>
<div id="scriptModalOverlay" class="script-modal-overlay" style="display:none" onclick="if(event.target===this)closeScriptModal()">
  <div class="script-modal" id="scriptModalInner"></div>
</div>

<script>
let allLeads = [];
let blacklist = [];
let activeFilter = 'all';
let activeBizFilter = 'all';

// ── Supabase helpers ──
async function dbPut(store, val){
  const {error} = await supabaseClient.from(store).upsert(val, {onConflict:'place_id'});
  if(error) console.error('dbPut', store, error);
}
async function dbDel(store, key){
  const {error} = await supabaseClient.from(store).delete().eq('place_id', key);
  if(error) console.error('dbDel', store, key, error);
}
async function dbAll(store){
  const {data, error} = await supabaseClient.from(store).select('*');
  if(error) console.error('dbAll', store, error);
  return data || [];
}

async function load(){
  allLeads = await dbAll('leads');
  blacklist = await dbAll('blacklist');
  renderStats();
  buildLocationOptions();
  buildBizTypeChips();
  render();
  const blSection = document.getElementById('blacklistToggle');
  if(blacklist.length){ blSection.style.display='flex'; document.getElementById('blCount').textContent=blacklist.length; }
}

// ── Location options ──
function extractCity(address){
  // "123 Main St, Miami, FL 33101, USA" → "Miami, FL"
  if(!address) return '';
  const parts = address.split(',').map(s=>s.trim());
  // Find the part that looks like a city (before the state abbreviation)
  for(let i=1;i<parts.length-1;i++){
    const next = parts[i+1]||'';
    if(/^[A-Z]{2}\s*\d{0,5}$/.test(next.trim().split(' ')[0])) return parts[i];
    if(/^[A-Z]{2}\b/.test(next.trim())) return parts[i];
  }
  return parts[1]||'';
}

function buildBizTypeChips(){
  const row = document.getElementById('bizTypeFilterRow');
  // Treat null/missing business_type as 'restaurant'
  const types = [...new Set(allLeads.map(l => l.business_type || 'restaurant'))].sort();
  const BIZ_LABELS = {
    restaurant:'🍽️ Restaurant', spa:'💆 Med Spa', hair_salon:'✂️ Salon',
    nail_salon:'💅 Nail Salon', gym:'🏋️ Gym', yoga_studio:'🧘 Yoga',
    dentist:'🦷 Dentist', cafe:'☕ Cafe', bar:'🍺 Bar',
    barber_shop:'💈 Barber', lodging:'🏨 Hotel', car_wash:'🚗 Car Wash',
  };
  const chips = types.map(t => {
    const label = BIZ_LABELS[t] || t.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    return `<button class="fchip${activeBizFilter===t?' active':''}" onclick="setBizFilter('${t}')">${label}</button>`;
  }).join('');
  row.innerHTML = `<span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-right:2px">TYPE</span>
    <button class="fchip${activeBizFilter==='all'?' active':''}" onclick="setBizFilter('all')">All Types</button>${chips}`;
  row.style.display = types.length > 0 ? 'flex' : 'none';
}

function setBizFilter(type) {
  activeBizFilter = type;
  buildBizTypeChips();
  render();
}

function buildLocationOptions(){
  const sel = document.getElementById('locationSel');
  const cities = [...new Set(allLeads.map(l=>extractCity(l.address)).filter(Boolean))].sort();
  const current = sel.value;
  sel.innerHTML = `<option value="">📍 All locations</option>` +
    cities.map(c=>`<option value="${c}"${c===current?'selected':''}>${c}</option>`).join('');
}

// ── Filter + Sort + Search ──
function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.fchip').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  render();
}

function getFiltered(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const locFilter=(document.getElementById('locationSel').value||'').toLowerCase();
  const sortVal=document.getElementById('sortSel')?.value||'score_desc';
  const minScore=parseInt(document.getElementById('minScoreSel')?.value||'0');
  let leads=allLeads.filter(l=>{
    if(activeBizFilter !== 'all'){ if((l.business_type||'restaurant') !== activeBizFilter) return false; }
    if(activeFilter==='all') {}
    else if(activeFilter==='HOT'||activeFilter==='WARM'||activeFilter==='COLD'){ if(l.label!==activeFilter) return false; }
    else if(activeFilter==='new'){ if(l.status && l.status!=='new') return false; }
    else if(activeFilter==='no_ig'){ if(l.instagram) return false; }
    else if(activeFilter==='has_ig'){ if(!l.instagram) return false; }
    else if(activeFilter==='ig_small'){ if(!l.instagram || (l.ig_followers||0)>=1000) return false; }
    else if(activeFilter==='ig_mid'){ if(!l.instagram || (l.ig_followers||0)<1000 || (l.ig_followers||0)>=10000) return false; }
    else if(activeFilter==='no_tt'){ if(l.tiktok) return false; }
    else if(activeFilter==='has_tt'){ if(!l.tiktok) return false; }
    else if(activeFilter==='no_social'){ if(l.instagram||l.tiktok||l.facebook) return false; }
    else if(activeFilter==='no_website'){ if(l.website) return false; }
    else if(activeFilter==='has_phone'){ if(!l.phone) return false; }
    else { if(l.status!==activeFilter) return false; }
    if(minScore && (l.score||0)<minScore) return false;
    if(locFilter && !(l.address||'').toLowerCase().includes(locFilter)) return false;
    if(q){
      const hay=(l.name+(l.address||'')+(l.notes||'')+(l.instagram||'')+(l.tiktok||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  leads.sort((a,b)=>{
    if(sortVal==='score_desc') return (b.score||0)-(a.score||0);
    if(sortVal==='score_asc')  return (a.score||0)-(b.score||0);
    if(sortVal==='name_asc')   return a.name.localeCompare(b.name);
    if(sortVal==='date_desc')  return (b.scanned_at||0)-(a.scanned_at||0);
    if(sortVal==='status'){
      const order={signed:0,interested:1,contacted:2,new:3,denied:4};
      return (order[a.status||'new']??3)-(order[b.status||'new']??3);
    }
    return 0;
  });
  return leads;
}

// ── Render ──
function renderStats(){
  const s=document.getElementById('statsBar');
  const total=allLeads.length;
  const hot=allLeads.filter(l=>l.label==='HOT').length;
  const warm=allLeads.filter(l=>l.label==='WARM').length;
  const cold=allLeads.filter(l=>l.label==='COLD').length;
  const signed=allLeads.filter(l=>l.status==='signed').length;
  const contacted=allLeads.filter(l=>l.status==='contacted'||l.status==='interested').length;
  s.innerHTML=`
    <div class="stat-pill"><div class="v">${total}</div><div class="l">Total</div></div>
    <div class="stat-pill hot"><div class="v">${hot}</div><div class="l">HOT</div></div>
    <div class="stat-pill warm"><div class="v">${warm}</div><div class="l">WARM</div></div>
    <div class="stat-pill cold"><div class="v">${cold}</div><div class="l">COLD</div></div>
    <div class="stat-pill signed"><div class="v">${signed}</div><div class="l">Signed</div></div>
    <div class="stat-pill"><div class="v">${contacted}</div><div class="l">In Progress</div></div>
  `;
}

// ── Actions ──
async function setStatus(placeId, status){
  const lead = allLeads.find(l=>l.place_id===placeId);
  if(!lead) return;
  lead.status = status;
  const {error} = await supabaseClient.from('leads').update({status, updated_by: currentUser ? currentUser.id : null, updated_at: new Date().toISOString()}).eq('place_id', placeId);
  if(error) console.error('setStatus', error);
  if(status==='denied'){
    const blEntry = {place_id:placeId, name:lead.name, blacklisted_by: currentUser ? currentUser.id : null, blacklisted_at: new Date().toISOString()};
    await dbPut('blacklist', blEntry);
    blacklist = blacklist.filter(b=>b.place_id!==placeId);
    blacklist.push(blEntry);
    document.getElementById('blCount').textContent=blacklist.length;
    document.getElementById('blacklistToggle').style.display='flex';
  } else {
    await dbDel('blacklist',placeId);
    blacklist = blacklist.filter(b=>b.place_id!==placeId);
    document.getElementById('blCount').textContent=blacklist.length;
  }
  renderStats();
  render();
}

async function saveNotes(placeId, notes){
  const lead = allLeads.find(l=>l.place_id===placeId);
  if(!lead) return;
  lead.notes = notes;
  const {error} = await supabaseClient.from('leads').update({notes, updated_by: currentUser ? currentUser.id : null}).eq('place_id', placeId);
  if(error) console.error('saveNotes', error);
}

async function deleteLead(placeId){
  if(!confirm('Remove this lead from the database?')) return;
  allLeads = allLeads.filter(l=>l.place_id!==placeId);
  await dbDel('leads', placeId);
  await dbDel('scan_cache', placeId);
  renderStats();
  render();
}

async function clearDenied(){
  if(!confirm('Permanently delete all denied leads? Their place IDs will stay blacklisted.')) return;
  const denied = allLeads.filter(l=>l.status==='denied');
  for(const l of denied){
    await supabaseClient.from('leads').delete().eq('place_id',l.place_id);
    await supabaseClient.from('scan_cache').delete().eq('place_id',l.place_id);
  }
  allLeads = allLeads.filter(l=>l.status!=='denied');
  renderStats();
  render();
}

async function clearAll(){
  if(!confirm('Delete ALL leads and scan cache? This lets you rescan everything fresh.\n\nBlacklisted places will NOT be removed.')) return;
  const {error: e1} = await supabaseClient.from('leads').delete().neq('place_id','');
  const {error: e2} = await supabaseClient.from('scan_cache').delete().neq('place_id','');
  if(e1) console.error('clearAll leads', e1);
  if(e2) console.error('clearAll scan_cache', e2);
  allLeads = [];
  renderStats();
  buildLocationOptions();
  render();
}

async function unblacklist(placeId){
  await dbDel('blacklist',placeId);
  blacklist=blacklist.filter(b=>b.place_id!==placeId);
  const lead=allLeads.find(l=>l.place_id===placeId);
  if(lead){
    lead.status='new';
    await supabaseClient.from('leads').update({status:'new', updated_by: currentUser ? currentUser.id : null}).eq('place_id',placeId);
  }
  document.getElementById('blCount').textContent=blacklist.length;
  if(!blacklist.length) document.getElementById('blacklistToggle').style.display='none';
  toggleBlacklist(); toggleBlacklist();
  render();
}

function parseAddress(address){
  // "123 Main St, City, State ZIP, Country" → {street, city, state}
  const parts=(address||'').split(',').map(s=>s.trim());
  const street=parts[0]||'';
  const city=parts[1]||'';
  const stateZip=parts[2]||'';
  const state=stateZip.replace(/\d{5}(-\d{4})?/,'').trim();
  return {street,city,state};
}
function esc(v){ return `"${String(v||'').replace(/"/g,'""')}"`; }

function markExported(ids){

async function enrichLead(placeId){
  const lead = allLeads.find(l=>l.place_id===placeId);
  if(!lead) return;
  const cell = document.getElementById(`owner-${placeId}`);

  // First try IG bio parse (instant, no network)
  if (lead.ig_bio) {
    const m = lead.ig_bio.match(/(?:owner|founder|operated by|run by|by)[:\s]+([A-Za-z]+(?: [A-Za-z]+)?)/i);
    if (m) {
      const name = m[1].trim();
      await supabaseClient.from('leads').update({ owner_name: name, owner_source: 'Instagram bio' }).eq('place_id', placeId);
      lead.owner_name = name; lead.owner_source = 'Instagram bio';
      const googleUrl = `https://www.google.com/search?q=${encodeURIComponent('"'+lead.name+'" owner')}`;
      if(cell) cell.innerHTML = `<div style="font-size:11px;font-weight:600">${name}</div><div style="font-size:9px;color:var(--muted)">Instagram bio</div><a href="${googleUrl}" target="_blank" style="font-size:9px;color:var(--accent);text-decoration:none">🔎 Google search</a>`;
      return;
    }
  }

  // Open SunBiz directly — content script reads the street from the URL hash
  const street = (lead.address||'').split(',')[0].trim().split(/\s+/).slice(0,3).join(' ');
  if (!street) {
    if(cell) cell.innerHTML = `<span style="font-size:10px;color:var(--muted)">No address</span>`;
    return;
  }

  _pendingEnrichId = placeId;
  if(cell) cell.innerHTML = '<span style="font-size:10px;color:var(--muted)">Opened SunBiz ↗</span>';
  navigator.clipboard.writeText(street).catch(()=>{});
  const sbHash = encodeURIComponent(JSON.stringify({ address: street }));
  window.open('https://search.sunbiz.org/Inquiry/CorporationSearch/ByAddress#' + sbHash, '_blank');
}

// ── IG Posts popup ──
function relDate(ts) {
  const sec = Math.floor(Date.now()/1000) - ts;
  if (sec < 3600) return Math.floor(sec/60)+'m ago';
  if (sec < 86400) return Math.floor(sec/3600)+'h ago';
  if (sec < 604800) return Math.floor(sec/86400)+'d ago';
  if (sec < 2592000) return Math.floor(sec/604800)+'w ago';
  return Math.floor(sec/2592000)+'mo ago';
}
function fmtNum(n) {
  if (n == null) return '';
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'')+'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k';
  return String(n);
}
function mediaIcon(type) {
  if (type === 2) return '🎬';
  if (type === 8) return '🖼';
  return '📸';
}

const _postsCache = {};

function showIgPosts(event, handle) {
  event.stopPropagation();
  const popup = document.getElementById('postsPopup');
  const btn = event.currentTarget;
  const rect = btn.getBoundingClientRect();

  popup.style.display = 'block';
  popup.innerHTML = `<h4>${igSvg()} @${handle} <span class="close-x" onclick="closePostsPopup()">✕</span></h4><div style="color:var(--muted);padding:8px 0">Loading…</div>`;

  // Position below the button
  popup.style.left = Math.min(rect.left, window.innerWidth - 300) + 'px';
  popup.style.top = (rect.bottom + 6) + 'px';

  // Check if we already have stored engagement data for this lead
  const storedLead = allLeads.find(l => l.instagram === handle);
  if (storedLead?.ig_engagement) {
    try {
      const data = typeof storedLead.ig_engagement === 'string'
        ? JSON.parse(storedLead.ig_engagement) : storedLead.ig_engagement;
      _postsCache[handle] = { posts: data.posts_details, engagementRate: data.engagement_rate, recentExplanation: data.recent_posts_explanation };
      renderPostsPopup(handle, _postsCache[handle]);
      return;
    } catch(e) {}
  }

  if (_postsCache[handle]) { renderPostsPopup(handle, _postsCache[handle]); return; }

  const apiKey = window._rapidApiKey || localStorage.getItem('leadscout_rapidapi_key');
  if (!apiKey) {
    document.getElementById('postsPopup').innerHTML = `<h4>@${handle} <span class="close-x" onclick="closePostsPopup()">✕</span></h4><div style="color:var(--hot)">No RapidAPI key found. Add it in the Scanner page settings.</div>`;
    return;
  }

  fetch(`/rapidapi-ig-posts?handle=${encodeURIComponent(handle)}&key=${encodeURIComponent(apiKey)}`)
  .then(r => r.json()).then(json => {
    console.log('[ig-posts] raw response:', JSON.stringify(json).slice(0, 500));
    if (json.message && !json.posts_details) throw new Error('API: ' + json.message);
    if (json.error) throw new Error(json.error + (json.detail ? ': ' + JSON.stringify(json.detail).slice(0,200) : ''));
    const posts = json?.posts_details || json?.data?.posts_details || [];
    if (!posts.length) throw new Error('Keys: ' + Object.keys(json).join(', ') + ' | ' + JSON.stringify(json).slice(0,200));
    _postsCache[handle] = { posts, engagementRate: json.engagement_rate_percentages, recentExplanation: json.recent_posts_explanation };
    renderPostsPopup(handle, _postsCache[handle]);
  }).catch(err => {
    document.getElementById('postsPopup').innerHTML = `<h4>@${handle} <span class="close-x" onclick="closePostsPopup()">✕</span></h4><div style="color:var(--hot);font-size:10px;word-break:break-all">${err.message}</div>`;
  });
}

function renderPostsPopup(handle, data) {
  const popup = document.getElementById('postsPopup');
  if (!data?.posts?.length) { popup.innerHTML = `<h4>@${handle} <span class="close-x" onclick="closePostsPopup()">✕</span></h4><div style="color:var(--muted)">No posts found.</div>`; return; }
  const engLine = data.engagementRate != null
    ? `<div style="font-size:10px;color:var(--warm);margin-bottom:8px">📊 ${data.engagementRate.toFixed(1)}% engagement · ${data.recentExplanation||''}</div>`
    : '';
  const rows = data.posts.map(p => {
    return `<div class="prow">
      <span class="pdate">${p.time_ago||relDate(p.taken_at)}</span>
      <span class="pstats">❤️ ${fmtNum(p.likes)} · 💬 ${fmtNum(p.comments)}</span>
    </div>`;
  }).join('');
  popup.innerHTML = `<h4>${igSvg()} @${handle} <span class="close-x" onclick="closePostsPopup()">✕</span></h4>${engLine}${rows}`;
}

function closePostsPopup() {
  document.getElementById('postsPopup').style.display = 'none';
}
document.addEventListener('click', e => {
  const popup = document.getElementById('postsPopup');
  if (popup.style.display !== 'none' && !popup.contains(e.target)) closePostsPopup();
});

function showSalesScript(placeId) {

  if (!lead) return;

  let eng = null;
  if (lead.ig_engagement) {
    try { eng = typeof lead.ig_engagement === 'string' ? JSON.parse(lead.ig_engagement) : lead.ig_engagement; } catch(e) {}
  }

  // Compute stats
  const followers = lead.ig_followers || 0;
  const engRate = eng?.engagement_rate || eng?.engagement_rate_percentages || null;
  const posts = eng?.posts_details || [];
  const avgLikes = posts.length ? Math.round(posts.reduce((s,p)=>s+(p.likes||0),0)/posts.length) : null;
  const avgComments = posts.length ? Math.round(posts.reduce((s,p)=>s+(p.comments||0),0)/posts.length) : null;

  // Posts per month from last 12 posts
  let postsPerMonth = null;
  if (posts.length >= 2) {
    const sorted = [...posts].filter(p=>p.taken_at).sort((a,b)=>b.taken_at-a.taken_at);
    if (sorted.length >= 2) {
      const newest = sorted[0].taken_at * 1000;
      const oldest = sorted[sorted.length-1].taken_at * 1000;
      const months = (newest - oldest) / (1000*60*60*24*30.5);
      postsPerMonth = months > 0 ? Math.round(sorted.length / months) : sorted.length;
    }
  }
  const lastPost = posts[0]?.time_ago || null;

  // Classify size
  const size = followers >= 10000 ? 'large' : followers >= 1000 ? 'medium' : 'small';
  const tier = (lead.label || 'cold').toLowerCase();
  const bizType = lead.business_type || 'restaurant';
  const name = lead.name || 'this business';
  const handle = lead.instagram ? `@${lead.instagram}` : '';

  const script = buildScript({ tier, size, bizType, name, handle, followers, engRate, avgLikes, avgComments, postsPerMonth, lastPost, lead });

  const statPills = buildStatPills({ followers, engRate, avgLikes, avgComments, postsPerMonth, lastPost });

  const tierColor = tier === 'hot' ? 'var(--hot)' : tier === 'warm' ? 'var(--warm)' : 'var(--muted)';
  const tierEmoji = tier === 'hot' ? '🔥' : tier === 'warm' ? '🌡️' : '❄️';
  const sizeLabel = size === 'large' ? 'Large account' : size === 'medium' ? 'Mid-size account' : 'Small/new account';

  document.getElementById('scriptModalInner').innerHTML = `
    <button class="script-close" onclick="closeScriptModal()">✕</button>
    <h3>${name}</h3>
    <div class="script-meta">
      <span style="color:${tierColor}">${tierEmoji} ${(lead.label||'COLD').toUpperCase()}</span>
      ${handle ? `<span>${igSvg()} ${handle}</span>` : ''}
      <span>👥 ${sizeLabel}</span>
      ${lead.score ? `<span>⭐ Score ${lead.score}</span>` : ''}
    </div>
    ${statPills}
    <div class="script-section">
      <h4>Personalized Pitch Script</h4>
      <div class="script-body" id="scriptText">${script}</div>
    </div>
    <button class="copy-btn" onclick="copyScript()">📋 Copy Script</button>
  `;
  document.getElementById('scriptModalOverlay').style.display = 'flex';
}

function buildStatPills({ followers, engRate, avgLikes, avgComments, postsPerMonth, lastPost }) {
  const pills = [];
  if (followers) pills.push(`<div class="script-stat-pill"><b>${fmtNum(followers)}</b>Followers</div>`);
  if (engRate != null) pills.push(`<div class="script-stat-pill"><b>${Number(engRate).toFixed(1)}%</b>Engagement</div>`);
  if (avgLikes != null) pills.push(`<div class="script-stat-pill"><b>${fmtNum(avgLikes)}</b>Avg Likes</div>`);
  if (avgComments != null) pills.push(`<div class="script-stat-pill"><b>${fmtNum(avgComments)}</b>Avg Comments</div>`);
  if (postsPerMonth != null) pills.push(`<div class="script-stat-pill"><b>${postsPerMonth}x/mo</b>Post Freq</div>`);
  if (lastPost) pills.push(`<div class="script-stat-pill"><b>${lastPost}</b>Last Post</div>`);
  return pills.length ? `<div class="script-stat-pills">${pills.join('')}</div>` : '';
}

function buildScript({ tier, size, bizType, name, handle, followers, engRate, avgLikes, avgComments, postsPerMonth, lastPost, lead }) {
  const foll = followers ? `${fmtNum(followers)} followers` : null;
  const likes = avgLikes != null ? fmtNum(avgLikes) : null;
  const ppm = postsPerMonth != null ? postsPerMonth : null;
  const owner = lead.owner_name || null;

  // Niche-specific language
  const isSpa = /spa|aesthetic|medspa|med.spa|laser|beauty|wellness/i.test(bizType);
  const isGym = /gym|fitness|yoga|pilates|crossfit/i.test(bizType);
  const isSalon = /salon|hair|barber|nail/i.test(bizType);
  const niche = isSpa ? 'spa' : isGym ? 'gym' : isSalon ? 'salon' : 'restaurant';

  const NICHE = {
    spa: {
      clients: 'clients', product: 'treatments', action: 'book appointments',
      pitch: 'turn their Instagram into a steady stream of new clients booking injectables, facials, and body treatments',
      gap: 'clients are searching for med spas on Instagram every day — if you\'re not showing up, they\'re booking with someone else',
      cta: 'Would you be open to a quick call to see what we\'d do for your account?'
    },
    gym: {
      clients: 'members', product: 'classes & training', action: 'sign up for memberships',
      pitch: 'use Instagram and TikTok to drive new member sign-ups and keep current members engaged',
      gap: 'people look for gyms and trainers on social media before they ever Google you',
      cta: 'Can I show you what that looks like for a gym like yours?'
    },
    salon: {
      clients: 'clients', product: 'services', action: 'book appointments',
      pitch: 'grow their client base through Instagram — showcasing their work to attract new bookings on autopilot',
      gap: 'salons that post consistently on Instagram fill their chairs way faster than ones that don\'t',
      cta: 'Would you want to see what we\'d create for your account?'
    },
    restaurant: {
      clients: 'customers', product: 'food & experience', action: 'walk in or make reservations',
      pitch: 'turn their Instagram presence into actual reservations and walk-ins — not just followers',
      gap: 'people decide where to eat based on what they see on Instagram',
      cta: 'Would you be open to a quick 15-minute call to see if it\'s a fit?'
    },
  };
  const N = NICHE[niche];

  // Plain-English engagement explanation for owners
  const engExplain = engRate != null
    ? `out of every 100 people who follow you, about ${Math.round(Number(engRate))} are liking or commenting on your posts`
    : null;
  const engLow = engRate != null && Number(engRate) < 2;
  const engGood = engRate != null && Number(engRate) >= 4;

  const opener = owner ? `Hey ${owner.split(' ')[0]}, ` : `Hey, I'm reaching out to ${name} — `;

  if (tier === 'hot') {
    if (size === 'large') {
      return `${opener}I came across ${handle || name} on Instagram${foll ? ` and saw you have ${foll}` : ''}.

Honestly, your account has real potential — but I noticed${ppm ? ` you're only posting about ${ppm} time${ppm===1?'':'s'} a month` : ' the posting consistency could be stronger'}${likes ? `, and your posts are averaging ${likes} likes` : ''}.${engLow && engExplain ? ` Right now ${engExplain} — which means most of your audience isn't seeing your content.` : ''} With an audience your size, that's leaving a lot of table traffic on the floor.

We work specifically with restaurants to turn their Instagram presence into actual reservations and walk-ins — not just followers. We handle content, scheduling, story strategy, and growth so you don't have to think about it.

Given what you already have built, I think we could 2-3x your results within 60 days.

${N.cta}`;
    }
    if (size === 'medium') {
      return `${opener}I found ${handle || name} on Instagram${foll ? ` — ${foll}` : ''}${likes ? `, averaging ${likes} likes per post` : ''}.${engGood && engExplain ? ` And ${engExplain} — that's actually really strong.` : ''}

You're in a really solid position — you've already built an audience and people are engaging. The gap right now is converting that attention into more ${N.clients} walking through the door.

We help ${niche === 'restaurant' ? 'restaurants' : 'businesses'} like yours take that existing momentum and turn it into a consistent flow of new ${N.clients} — through smarter content, targeted reels, and local audience growth.

${ppm ? `At ${ppm} post${ppm===1?'':'s'}/month, there's definitely room to increase your reach without it becoming a full-time job for you.` : `We handle the heavy lifting so you can focus on your ${N.product}.`}

Could I show you exactly what we'd do for your account? Takes 15 minutes.`;
    }
    // small + hot
    return `${opener}I noticed ${handle || name} on Instagram${foll ? ` (${foll})` : ''} — and I love what you're doing.

Here's the thing:${engGood && engExplain ? ` ${engExplain} — that's actually well above average.` : ''} ${likes ? `Your posts are getting ${likes} likes each, which` : 'That'} means your audience genuinely cares about what you do. You just need more people to see it.

We work with small ${niche === 'restaurant' ? 'restaurants' : `${niche}s`} to grow their Instagram from a few hundred followers to thousands of real local ${N.clients} — and we do it through content that actually looks good and tells your story.

${lastPost ? `I saw your last post was ${lastPost} — ` : ''}Consistency is the #1 thing holding most small accounts back, and we take that off your plate completely.

Want me to show you a quick example of what we'd do for your page?`;
  }

  if (tier === 'warm') {
    if (size === 'large') {
      return `${opener}I was looking at ${handle || name} on Instagram${foll ? ` — ${foll}` : ''}.${engExplain ? ` Right now ${engExplain}${engLow ? `, which means most of your followers aren't seeing what you post` : ''}.` : ''}

You clearly have the audience. The opportunity I see is that${ppm ? ` at ${ppm} post${ppm===1?'':'s'} per month` : ''}, there's room to show up more consistently and turn those followers into paying ${N.clients}.

We specialize in social media for ${niche === 'restaurant' ? 'restaurants' : `${niche}s`} — content strategy, reels, local targeting — all done for you. Accounts your size typically see a 40-60% boost in profile visits within the first 30 days.

${likes ? `With posts averaging ${likes} likes, your content resonates — we just need to amplify it.` : 'Your content clearly resonates — we just need to amplify it.'}

Open to a quick call this week?`;
    }
    return `${opener}I came across ${handle || name}${handle ? ' on Instagram' : ''}${foll ? ` — ${foll}` : ''}.${engExplain ? ` Currently ${engExplain}.` : ''}

You've got a solid base${ppm ? ` and you're posting ${ppm}x a month` : ''}, which is more than most ${niche === 'restaurant' ? 'restaurants' : 'businesses'} I talk to. The next step is making sure every post is working as hard as possible to help ${N.action}.

We help ${niche === 'restaurant' ? 'restaurants' : 'businesses'} like yours turn social media from something you do occasionally into a real ${N.clients} acquisition channel — without adding hours to your week.

${likes ? `Your posts are getting around ${likes} likes each — with the right strategy, we can push that significantly higher and get in front of locals searching for ${niche === 'restaurant' ? 'places to eat' : `a ${bizType.replace(/_/g,' ')}`} nearby.` : `With the right strategy, we can get your posts in front of locals actively searching for ${niche === 'restaurant' ? 'places to eat' : `a ${bizType.replace(/_/g,' ')}`} nearby.`}

Could I jump on a quick call to walk you through what we'd do specifically for your account?`;
  }

  // cold
  if (size === 'large') {
    return `${opener}I found ${handle || name} on Instagram${foll ? ` with ${foll}` : ''}.${engExplain && engLow ? ` Right now ${engExplain} — meaning most of your audience scrolls right past your posts.` : ''}

With an audience that size, you should be seeing way more traction — more ${N.clients}, more bookings, more people talking about you online.

We work with established ${niche === 'restaurant' ? 'restaurants' : 'businesses'} to reignite their social presence. Whether it's a content refresh, better use of reels, or a local growth push, we build a strategy around what actually drives ${N.clients}.

${lastPost ? `I noticed your last post was ${lastPost} — even a simple consistency fix can make a big difference.` : 'Consistency and strategy together make a huge difference.'}

Worth a 15-minute conversation?`;
  }
  return `${opener}I came across ${handle || name}${handle ? ' on Instagram' : ''}${foll ? ` — ${foll}` : ''}.

I'll be honest — ${N.gap}, and the businesses that get serious about it now are going to have a big head start on everyone else in their area.

We help ${niche === 'restaurant' ? 'restaurants' : `${bizType.replace(/_/g,' ')}s`} build their social presence from scratch${foll ? ` — even at ${fmtNum(followers)} followers` : ''}, we've taken accounts and grown them to thousands of engaged local ${N.clients} within a few months.

${ppm && ppm < 4 ? `Posting ${ppm}x a month isn't enough to build momentum — we handle all of that for you.` : `We handle the content, the posting, and the strategy — you just focus on your ${N.product}.`}

Would you be open to seeing what's possible for your business?`;
}

function closeScriptModal() {
  document.getElementById('scriptModalOverlay').style.display = 'none';
}

function copyScript() {
  const text = document.getElementById('scriptText')?.innerText || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy Script', 2000);
  });
}

// ── Auto-refresh ──
let _autoRefreshTimer = null;
let _lastRefresh = 0;

async function autoRefresh() {
  const now = Date.now();
  const { data: newLeads } = await supabaseClient.from('leads').select('*').gt('scanned_at', _lastRefresh);
  if (newLeads?.length) {
    let added = 0;
    for (const lead of newLeads) {
      const idx = allLeads.findIndex(l => l.place_id === lead.place_id);
      if (idx === -1) { allLeads.push(lead); added++; }
      else allLeads[idx] = { ...allLeads[idx], ...lead };
    }
    _lastRefresh = now;
    renderStats();
    buildLocationOptions();
    buildBizTypeChips();
    render();
    if (added) {
      const badge = document.getElementById('refreshBadge');
      if (badge) { badge.textContent = `+${added} new`; badge.style.opacity = '1'; setTimeout(() => badge.style.opacity = '0', 2000); }
    }
  }
}

function startAutoRefresh() {
  _lastRefresh = Date.now();
  _autoRefreshTimer = setInterval(autoRefresh, 15000);
  document.getElementById('refreshDot').style.background = 'var(--cold)';
}
function stopAutoRefresh() {
  clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = null;
  document.getElementById('refreshDot').style.background = 'var(--muted)';
}
function toggleAutoRefresh() {
  _autoRefreshTimer ? stopAutoRefresh() : startAutoRefresh();
}

// ── Init ──
(async () => {
  const user = await requireAuth();
  if(!user) return;
  const uname = await getUserName();
  const lbl = document.getElementById('userLabel');
  if(lbl) lbl.textContent = uname;
  // Load Apollo key from localStorage
  const savedApollo = localStorage.getItem('leadscout_apollo_key');
  if(savedApollo) document.getElementById('apolloKeyInput').value = savedApollo;
  const savedRapid = localStorage.getItem('leadscout_rapidapi_key');
  if(savedRapid) {
    document.getElementById('rapidApiKeyInput').value = savedRapid;
    window.postMessage({ __leadscout_ext: true, type: 'set_rapidapi_key', key: savedRapid }, '*');
  }
  // Load RapidAPI key from shared_settings (same place scanner stores it)
  const { data: sharedSettings } = await supabaseClient.from('shared_settings').select('rapid_key').eq('id', 1).single();
  if (sharedSettings?.rapid_key) window._rapidApiKey = sharedSettings.rapid_key;
  // Lock API key inputs to admin only
  if (!isAdmin()) {
    ['rapidApiKeyInput','apolloKeyInput'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.value = '••••••••••••••••'; el.disabled = true; el.style.opacity = '0.4'; el.style.cursor = 'not-allowed'; }
    });
  }

  await load();
  _lastRefresh = Date.now();
})();
</script>
