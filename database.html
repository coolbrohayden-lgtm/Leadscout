<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LeadScout — Database</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2230;--border:#2a3040;
  --text:#e6edf3;--muted:#7d8590;--accent:#6c63ff;
  --hot:#ff5f5f;--warm:#f5a623;--cold:#4ade80;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;}
.logo{font-size:15px;font-weight:700;}.logo span{color:var(--accent);}
.back-btn{font-size:12px;color:var(--muted);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:6px;transition:.15s;}
.back-btn:hover{color:var(--text);border-color:var(--accent);}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{padding:5px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);}
.btn:hover{opacity:.8;}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-danger{background:rgba(255,95,95,.15);border-color:var(--hot);color:var(--hot);}

/* Stats bar */
.stats-bar{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.stat-pill{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;text-align:center;min-width:90px;}
.stat-pill .v{font-size:22px;font-weight:700;}
.stat-pill .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.stat-pill.hot .v{color:var(--hot);}
.stat-pill.warm .v{color:var(--warm);}
.stat-pill.cold .v{color:var(--cold);}
.stat-pill.signed .v{color:#6c63ff;}

/* Controls */
.controls{display:flex;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap;}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 10px;outline:none;width:220px;}
.search-box:focus{border-color:var(--accent);}
.filter-chips{display:flex;gap:5px;flex-wrap:wrap;}
.fchip{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.15s;}
.fchip:hover{border-color:var(--accent);color:var(--text);}
.fchip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.fchip.fc-hot.active{background:var(--hot);border-color:var(--hot);}
.fchip.fc-warm.active{background:var(--warm);border-color:var(--warm);}
.fchip.fc-cold.active{background:var(--cold);border-color:var(--cold);}
.fchip.fc-signed.active{background:#6c63ff;border-color:#6c63ff;}
.fchip.fc-denied.active{background:#444;border-color:#666;color:#aaa;}
.sort-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:4px 8px;outline:none;}

/* View toggle (Table / Pipeline) */
.view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.view-toggle button{border:none;background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;padding:5px 12px;cursor:pointer;transition:.15s;}
.view-toggle button.active{background:var(--accent);color:#fff;}

/* Pipeline (kanban) board */
.pipeline-wrap{display:flex;gap:12px;padding:16px 20px;overflow-x:auto;align-items:flex-start;min-height:60vh;}
.pipe-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:250px;width:250px;flex-shrink:0;display:flex;flex-direction:column;max-height:78vh;}
.pipe-col-head{padding:10px 12px;border-bottom:2px solid var(--pipe-color,var(--border));display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--surface);border-radius:10px 10px 0 0;z-index:1;}
.pipe-col-head .t{font-size:12px;font-weight:800;letter-spacing:.03em;}
.pipe-col-head .n{font-size:10px;font-weight:700;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:1px 7px;color:var(--muted);margin-left:auto;}
.pipe-col-body{padding:8px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;min-height:80px;transition:background .15s;}
.pipe-col-body.drag-over{background:rgba(108,99,255,.08);outline:2px dashed var(--accent);outline-offset:-4px;border-radius:0 0 10px 10px;}
.pipe-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:grab;transition:border-color .15s, opacity .15s;}
.pipe-card:hover{border-color:var(--accent);}
.pipe-card.dragging{opacity:.4;cursor:grabbing;}
.pipe-card .nm{font-size:12px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.pipe-card .meta{font-size:10px;color:var(--muted);margin-bottom:5px;}
.pipe-card .socials{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:5px;}
.pipe-card .foot{display:flex;gap:5px;align-items:center;}
.pipe-empty{font-size:10px;color:var(--muted);text-align:center;padding:14px 0;}
.add-stage-btn{min-width:180px;flex-shrink:0;border:2px dashed var(--border);border-radius:10px;background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;padding:20px;height:fit-content;transition:.15s;}
.add-stage-btn:hover{border-color:var(--accent);color:var(--accent);}
.stage-del{margin-left:4px;border:none;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;padding:0 3px;border-radius:3px;}
.stage-del:hover{color:var(--hot);}
.stage-swatch{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;display:inline-block;}
.stage-swatch.sel{border-color:#fff;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--accent);color:var(--text);font-size:12px;font-weight:600;padding:9px 18px;border-radius:8px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:1;}

/* Table */
.table-wrap{overflow-x:auto;padding:0 20px 20px;}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;}
th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:7px 10px;border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text);}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:hover td{background:var(--surface2);}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;}
.badge-hot{background:rgba(255,95,95,.2);color:var(--hot);}
.badge-warm{background:rgba(245,166,35,.2);color:var(--warm);}
.badge-cold{background:rgba(74,222,128,.15);color:var(--cold);}
.badge-new{background:var(--surface2);color:var(--muted);}
.badge-contacted{background:rgba(108,99,255,.2);color:#a09aff;}
.badge-interested{background:rgba(245,166,35,.15);color:var(--warm);}
.badge-signed{background:rgba(74,222,128,.15);color:var(--cold);}
.badge-denied{background:rgba(100,100,100,.15);color:#888;}

/* Social pills */
.pill{display:inline-flex;align-items:center;gap:3px;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600;text-decoration:none;margin:1px;}
.pill-ig{background:rgba(200,80,192,.15);border:1px solid rgba(200,80,192,.4);color:#c850c0;}
.pill-tt{background:rgba(105,201,208,.15);border:1px solid rgba(105,201,208,.4);color:#69C9D0;}
.pill-fb{background:rgba(66,103,178,.15);border:1px solid rgba(66,103,178,.4);color:#6080c8;}
.pill-dim{opacity:.35;}

/* Status select */
.status-sel{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;padding:2px 5px;cursor:pointer;outline:none;}

/* Notes */
.notes-input{background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--text);font-size:11px;width:140px;outline:none;padding:2px 0;}
.notes-input:focus{border-bottom-color:var(--accent);}
.notes-input::placeholder{color:var(--muted);}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;line-height:1.8;}

/* Posts popup */
.posts-popup{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;min-width:220px;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.5);font-size:11px;}
.posts-popup h4{font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.posts-popup h4 span{color:var(--muted);font-weight:400;}
.posts-popup .prow{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);}
.posts-popup .prow:last-child{border-bottom:none;}
.posts-popup .pdate{color:var(--muted);min-width:40px;}
.posts-popup .pstats{display:flex;gap:8px;color:var(--text);}
.posts-popup .pstat{display:flex;align-items:center;gap:2px;}
.posts-popup .close-x{cursor:pointer;color:var(--muted);font-size:14px;line-height:1;}
.posts-popup .close-x:hover{color:var(--text);}
.posts-btn{background:none;border:none;cursor:pointer;font-size:10px;color:var(--muted);padding:0 2px;line-height:1;vertical-align:middle;}
.posts-btn:hover{color:var(--text);}

/* Script modal */
.script-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;}
.script-modal{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;max-width:580px;width:90%;max-height:80vh;overflow-y:auto;position:relative;}
.script-modal h3{margin:0 0 4px 0;font-size:15px;}
.script-modal .script-meta{font-size:11px;color:var(--muted);margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;}
.script-modal .script-meta span{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;}
.script-modal .script-section{margin-bottom:16px;}
.script-modal .script-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 6px 0;}
.script-modal .script-body{font-size:13px;line-height:1.6;white-space:pre-wrap;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px 14px;}
.script-modal .script-close{position:absolute;top:14px;right:16px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);}
.script-modal .script-close:hover{color:var(--text);}
.script-modal .copy-btn{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:6px 14px;font-size:12px;cursor:pointer;margin-top:10px;}
.script-modal .copy-btn:hover{opacity:.85;}
.script-stat-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.script-stat-pill{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;text-align:center;}
.script-stat-pill b{display:block;font-size:15px;color:var(--accent);}
.seg-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.seg-tab{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s;}
.seg-tab:hover{border-color:var(--accent);color:var(--text);}
.seg-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.seg-body.hidden{display:none;}

/* Blacklist section toggle */
.section-toggle{font-size:11px;color:var(--muted);cursor:pointer;padding:8px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.section-toggle:hover{color:var(--text);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/auth.js"></script>
</head>
<body>

<header>
  <div class="logo">Lead<span>Scout</span></div>
  <a href="/" class="back-btn">← Back to Map</a>
  <div class="hdr-right">
    <button class="btn" onclick="toggleAutoRefresh()" style="display:flex;align-items:center;gap:5px"><span id="refreshDot" style="width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block"></span>Live</button>
    <span id="refreshBadge" style="font-size:10px;color:var(--cold);opacity:0;transition:opacity .4s"></span>
    <button class="btn" onclick="exportCSV()">Export CSV</button>
    <button class="btn" onclick="toggleSettings()" id="settingsBtn" style="display:none">⚙️ Settings</button>
    <button class="btn" onclick="togglePendingPanel()" id="pendingBtn" style="display:none;position:relative">👤 Pending<span id="pendingCount" style="display:none;position:absolute;top:-6px;right:-6px;background:var(--warm);color:#000;font-size:9px;font-weight:800;border-radius:8px;padding:1px 5px"></span></button>
    <button class="btn" onclick="toggleActivityPanel()">🕘 Activity</button>
    <button class="btn btn-danger" onclick="clearDenied()">Clear Denied</button>
    <button class="btn btn-danger" onclick="clearAll()">🗑 Clear All</button>
  </div>
    <span id="userLabel" style="font-size:11px;color:var(--muted);white-space:nowrap"></span>
    <button class="btn" style="font-size:11px" onclick="signOut()">Sign Out</button>
  </header>
  <div id="settingsPanel" style="display:none;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap;align-items:center">
    <label style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;display:flex;flex-direction:column;gap:4px">Apollo.io API Key (for owner lookup)<input id="apolloKeyInput" type="password" placeholder="Apollo API key" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 10px;outline:none;width:280px"/></label>
    <label style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;display:flex;flex-direction:column;gap:4px">RapidAPI Key (IG fallback)<input id="rapidApiKeyInput" type="password" placeholder="RapidAPI key" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 10px;outline:none;width:280px"/></label>
    <label style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;display:flex;flex-direction:column;gap:4px">Resend API Key (auto-email)<input id="resendKeyInput" type="password" placeholder="re_..." style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 10px;outline:none;width:280px"/></label>
    <label style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;display:flex;flex-direction:column;gap:4px">Email From Address<input id="resendFromInput" placeholder="You <you@yourdomain.com>" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 10px;outline:none;width:280px"/></label>
    <button class="btn btn-p" style="align-self:flex-end" onclick="saveEmailSettings()">Save Email Settings</button>
  </div>
  <div id="pendingPanel" style="display:none;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-direction:column;gap:8px">
    <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Accounts awaiting approval</div>
    <div id="pendingList" style="display:flex;flex-direction:column;gap:6px"></div>
  </div>
  <div id="activityPanel" style="display:none;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-direction:column;gap:6px;max-height:260px;overflow-y:auto">
    <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Recent team activity</div>
    <div id="activityList" style="display:flex;flex-direction:column;gap:4px"></div>
  </div>

<div class="stats-bar" id="statsBar"></div>

<div class="controls">
  <div class="view-toggle">
    <button id="viewTableBtn" class="active" onclick="setView('table')">📋 Table</button>
    <button id="viewPipeBtn" onclick="setView('pipeline')">📊 Pipeline</button>
  </div>
  <input class="search-box" id="searchBox" placeholder="Search by name, address, notes…" oninput="render()"/>
  <div class="filter-chips" style="margin-bottom:4px">
    <span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-right:2px">LABEL</span>
    <button class="fchip active" data-f="all" onclick="setFilter('all')">All</button>
    <button class="fchip fc-hot"  data-f="HOT"  onclick="setFilter('HOT')">🔥 HOT</button>
    <button class="fchip fc-warm" data-f="WARM" onclick="setFilter('WARM')">WARM</button>
    <button class="fchip fc-cold" data-f="COLD" onclick="setFilter('COLD')">COLD</button>
  </div>
  <div class="filter-chips" style="margin-bottom:4px">
    <span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-right:2px">STATUS</span>
    <button class="fchip" data-f="new"        onclick="setFilter('new')">🆕 New</button>
    <button class="fchip fc-signed"   data-f="signed"    onclick="setFilter('signed')">✅ Signed</button>
    <button class="fchip"             data-f="contacted" onclick="setFilter('contacted')">📞 Contacted</button>
    <button class="fchip"             data-f="interested" onclick="setFilter('interested')">👀 Interested</button>
    <button class="fchip fc-denied"   data-f="denied"    onclick="setFilter('denied')">🚫 Denied</button>
    <button class="fchip"             data-f="mine"      onclick="setFilter('mine')">🙋 Mine</button>
  </div>
  <div class="filter-chips" style="margin-bottom:4px" id="bizTypeFilterRow">
    <span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-right:2px">TYPE</span>
    <button class="fchip active" data-f="type_all" onclick="setBizFilter('all')">All Types</button>
  </div>
  <div class="filter-chips" style="margin-bottom:4px">
    <span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-right:2px">SOCIAL</span>
    <button class="fchip" data-f="no_ig"      onclick="setFilter('no_ig')">No Instagram</button>
    <button class="fchip" data-f="has_ig"     onclick="setFilter('has_ig')">Has Instagram</button>
    <button class="fchip" data-f="ig_small"   onclick="setFilter('ig_small')">IG &lt; 1k</button>
    <button class="fchip" data-f="ig_mid"     onclick="setFilter('ig_mid')">IG 1k–10k</button>
    <button class="fchip" data-f="no_tt"      onclick="setFilter('no_tt')">No TikTok</button>
    <button class="fchip" data-f="has_tt"     onclick="setFilter('has_tt')">Has TikTok</button>
    <button class="fchip" data-f="no_social"  onclick="setFilter('no_social')">No Social At All</button>
    <button class="fchip" data-f="no_website" onclick="setFilter('no_website')">No Website</button>
    <button class="fchip" data-f="has_phone"  onclick="setFilter('has_phone')">Has Phone</button>
  </div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <select class="sort-sel" id="locationSel" onchange="render()">
      <option value="">📍 All locations</option>
    </select>
    <select class="sort-sel" id="sortSel" onchange="render()">
      <option value="score_desc">Score ↓</option>
      <option value="score_asc">Score ↑</option>
      <option value="name_asc">Name A–Z</option>
      <option value="date_desc">Scanned (newest)</option>
      <option value="status">Status</option>
    </select>
    <select class="sort-sel" id="minScoreSel" onchange="render()">
      <option value="0">Min score: any</option>
      <option value="50">Min score: 50</option>
      <option value="70">Min score: 70 (WARM+)</option>
      <option value="100">Min score: 100</option>
      <option value="130">Min score: 130 (HOT+)</option>
    </select>
    <span id="countLabel" style="font-size:11px;color:var(--muted);margin-left:4px;"></span>
  </div>
</div>

<div class="table-wrap">
  <div id="tableContainer"></div>
</div>

<div class="section-toggle" id="blacklistToggle" onclick="toggleBlacklist()" style="display:none">
  ▶ Show blacklisted places (<span id="blCount">0</span>)
</div>
<div id="blacklistSection" style="display:none;padding:0 20px 20px;"></div>

<div id="postsPopup" class="posts-popup" style="display:none"></div>
<div id="scriptModalOverlay" class="script-modal-overlay" style="display:none" onclick="if(event.target===this)closeScriptModal()">
  <div class="script-modal" id="scriptModalInner"></div>
</div>

<div id="stageModalOverlay" class="script-modal-overlay" style="display:none" onclick="if(event.target===this)closeStageModal()">
  <div class="script-modal" style="max-width:360px">
    <button class="script-close" onclick="closeStageModal()">✕</button>
    <h3 style="margin-bottom:14px">New Pipeline Stage</h3>
    <div style="display:flex;flex-direction:column;gap:12px">
      <label style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;display:flex;flex-direction:column;gap:4px">Stage name
        <input id="stageName" placeholder="e.g. Follow Up Friday" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 10px;outline:none"/>
      </label>
      <label style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;display:flex;flex-direction:column;gap:4px">Emoji (optional)
        <input id="stageIcon" placeholder="📁" maxlength="4" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;width:80px"/>
      </label>
      <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Color
        <div id="stageColors" style="display:flex;gap:6px;margin-top:5px">
          <span class="stage-swatch sel" data-c="#6c63ff" style="background:#6c63ff" onclick="pickStageColor(this)"></span>
          <span class="stage-swatch" data-c="#f5a623" style="background:#f5a623" onclick="pickStageColor(this)"></span>
          <span class="stage-swatch" data-c="#4ade80" style="background:#4ade80" onclick="pickStageColor(this)"></span>
          <span class="stage-swatch" data-c="#ff5f5f" style="background:#ff5f5f" onclick="pickStageColor(this)"></span>
          <span class="stage-swatch" data-c="#38bdf8" style="background:#38bdf8" onclick="pickStageColor(this)"></span>
          <span class="stage-swatch" data-c="#e879f9" style="background:#e879f9" onclick="pickStageColor(this)"></span>
        </div>
      </div>
      <label style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;display:flex;flex-direction:column;gap:4px">Automation when a lead is dropped here
        <select id="stageAction" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:7px 10px;outline:none">
          <option value="none">None — just a stage</option>
          <option value="email">📧 Open email with pitch pre-filled</option>
          <option value="igdm">💬 Copy pitch + open Instagram DM</option>
          <option value="call">📱 Open phone dialer</option>
        </select>
      </label>
      <button class="copy-btn" style="margin-top:4px" onclick="saveStage()">＋ Create Stage</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let allLeads = [];
let blacklist = [];
let activeFilters = new Set();    // empty = 'all' (no restriction)
let activeBizFilters = new Set(); // empty = 'all' (no restriction) — types combine with OR

// Pairs of filters that can never both be true for the same lead —
// selecting one auto-removes the other if it's active.
const CONFLICT_PAIRS = [
  ['HOT','WARM'],['HOT','COLD'],['WARM','COLD'],
  ['new','contacted'],['new','interested'],['new','signed'],['new','denied'],
  ['contacted','interested'],['contacted','signed'],['contacted','denied'],
  ['interested','signed'],['interested','denied'],
  ['signed','denied'],
  ['no_ig','has_ig'],['no_ig','ig_small'],['no_ig','ig_mid'],
  ['ig_small','ig_mid'],
  ['no_tt','has_tt'],
  ['no_social','has_ig'],['no_social','ig_small'],['no_social','ig_mid'],['no_social','has_tt'],
];
const FILTER_CONFLICTS = {};
CONFLICT_PAIRS.forEach(([a,b])=>{
  (FILTER_CONFLICTS[a] = FILTER_CONFLICTS[a]||new Set()).add(b);
  (FILTER_CONFLICTS[b] = FILTER_CONFLICTS[b]||new Set()).add(a);
});

// ── Supabase helpers ──
async function dbPut(store, val){
  const {error} = await supabaseClient.from(store).upsert(val, {onConflict:'place_id'});
  if(error) console.error('dbPut', store, error);
}
async function dbDel(store, key){
  const {error} = await supabaseClient.from(store).delete().eq('place_id', key);
  if(error) console.error('dbDel', store, key, error);
}
async function dbAll(store){
  const {data, error} = await supabaseClient.from(store).select('*');
  if(error) console.error('dbAll', store, error);
  return data || [];
}

async function load(){
  allLeads = await dbAll('leads');
  blacklist = await dbAll('blacklist');
  await migrateLocalExports();
  await loadCustomStages();
  renderStats();
  buildLocationOptions();
  buildBizTypeChips();
  render();
  const blSection = document.getElementById('blacklistToggle');
  if(blacklist.length){ blSection.style.display='flex'; document.getElementById('blCount').textContent=blacklist.length; }
}

// ── Location options ──
function extractCity(address){
  // "123 Main St, Miami, FL 33101, USA" → "Miami, FL"
  if(!address) return '';
  const parts = address.split(',').map(s=>s.trim());
  // Find the part that looks like a city (before the state abbreviation)
  for(let i=1;i<parts.length-1;i++){
    const next = parts[i+1]||'';
    if(/^[A-Z]{2}\s*\d{0,5}$/.test(next.trim().split(' ')[0])) return parts[i];
    if(/^[A-Z]{2}\b/.test(next.trim())) return parts[i];
  }
  return parts[1]||'';
}

function buildBizTypeChips(){
  const row = document.getElementById('bizTypeFilterRow');
  // Treat null/missing business_type as 'restaurant'
  const types = [...new Set(allLeads.map(l => l.business_type || 'restaurant'))].sort();
  const BIZ_LABELS = {
    restaurant:'🍽️ Restaurant', spa:'💆 Med Spa', hair_salon:'✂️ Salon',
    nail_salon:'💅 Nail Salon', gym:'🏋️ Gym', yoga_studio:'🧘 Yoga',
    dentist:'🦷 Dentist', cafe:'☕ Cafe', bar:'🍺 Bar',
    barber_shop:'💈 Barber', lodging:'🏨 Hotel', car_wash:'🚗 Car Wash',
  };
  const chips = types.map(t => {
    const label = BIZ_LABELS[t] || t.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    return `<button class="fchip${activeBizFilters.has(t)?' active':''}" onclick="setBizFilter('${t}')">${label}</button>`;
  }).join('');
  row.innerHTML = `<span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-right:2px">TYPE</span>
    <button class="fchip${activeBizFilters.size===0?' active':''}" onclick="setBizFilter('all')">All Types</button>${chips}`;
  row.style.display = types.length > 0 ? 'flex' : 'none';
}

function setBizFilter(type) {
  if(type==='all'){ activeBizFilters.clear(); }
  else if(activeBizFilters.has(type)){ activeBizFilters.delete(type); }
  else { activeBizFilters.add(type); }
  buildBizTypeChips();
  render();
}

function buildLocationOptions(){
  const sel = document.getElementById('locationSel');
  const cities = [...new Set(allLeads.map(l=>extractCity(l.address)).filter(Boolean))].sort();
  const current = sel.value;
  sel.innerHTML = `<option value="">📍 All locations</option>` +
    cities.map(c=>`<option value="${c}"${c===current?'selected':''}>${c}</option>`).join('');
}

// ── Filter + Sort + Search ──
function setFilter(f){
  if(f==='all'){
    activeFilters.clear();
    refreshFilterChipUI();
    render();
    return;
  }
  if(activeFilters.has(f)){
    activeFilters.delete(f);
  } else {
    const conflicts = FILTER_CONFLICTS[f];
    const removed = [];
    if(conflicts){
      conflicts.forEach(c => { if(activeFilters.has(c)){ activeFilters.delete(c); removed.push(c); } });
    }
    activeFilters.add(f);
    if(removed.length) showToast(`Removed ${removed.join(', ')} — can't combine with ${f}`);
  }
  refreshFilterChipUI();
  render();
}

function refreshFilterChipUI(){
  document.querySelectorAll('.filter-chips .fchip[data-f]').forEach(b=>{
    const f = b.dataset.f;
    b.classList.toggle('active', f==='all' ? activeFilters.size===0 : activeFilters.has(f));
  });
}

function leadPassesFilter(l, f){
  switch(f){
    case 'HOT': case 'WARM': case 'COLD': return l.label===f;
    case 'new': return !l.status || l.status==='new';
    case 'contacted': case 'interested': case 'signed': case 'denied': return l.status===f;
    case 'no_ig': return !l.instagram;
    case 'has_ig': return !!l.instagram;
    case 'ig_small': return !!l.instagram && (l.ig_followers||0)<1000;
    case 'ig_mid': return !!l.instagram && (l.ig_followers||0)>=1000 && (l.ig_followers||0)<10000;
    case 'no_tt': return !l.tiktok;
    case 'has_tt': return !!l.tiktok;
    case 'no_social': return !l.instagram && !l.tiktok && !l.facebook;
    case 'no_website': return !l.website;
    case 'has_phone': return !!l.phone;
    case 'mine': return l.assigned_to===_myName;
    default: return true;
  }
}

function getFiltered(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const locFilter=(document.getElementById('locationSel').value||'').toLowerCase();
  const sortVal=document.getElementById('sortSel')?.value||'score_desc';
  const minScore=parseInt(document.getElementById('minScoreSel')?.value||'0');
  let leads=allLeads.filter(l=>{
    if(activeBizFilters.size){ if(!activeBizFilters.has(l.business_type||'restaurant')) return false; }
    for(const f of activeFilters){ if(!leadPassesFilter(l, f)) return false; }
    if(minScore && (l.score||0)<minScore) return false;
    if(locFilter && !(l.address||'').toLowerCase().includes(locFilter)) return false;
    if(q){
      const hay=(l.name+(l.address||'')+(l.notes||'')+(l.instagram||'')+(l.tiktok||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  leads.sort((a,b)=>{
    if(sortVal==='score_desc') return (b.score||0)-(a.score||0);
    if(sortVal==='score_asc')  return (a.score||0)-(b.score||0);
    if(sortVal==='name_asc')   return a.name.localeCompare(b.name);
    if(sortVal==='date_desc')  return (b.scanned_at||0)-(a.scanned_at||0);
    if(sortVal==='status'){
      const order={signed:0,interested:1,contacted:2,new:3,denied:4};
      return (order[a.status||'new']??3)-(order[b.status||'new']??3);
    }
    return 0;
  });
  return leads;
}

// ── Render ──
function renderStats(){
  const s=document.getElementById('statsBar');
  const total=allLeads.length;
  const hot=allLeads.filter(l=>l.label==='HOT').length;
  const warm=allLeads.filter(l=>l.label==='WARM').length;
  const cold=allLeads.filter(l=>l.label==='COLD').length;
  const signed=allLeads.filter(l=>l.status==='signed').length;
  const contacted=allLeads.filter(l=>l.status==='contacted'||l.status==='interested').length;
  s.innerHTML=`
    <div class="stat-pill"><div class="v">${total}</div><div class="l">Total</div></div>
    <div class="stat-pill hot"><div class="v">${hot}</div><div class="l">HOT</div></div>
    <div class="stat-pill warm"><div class="v">${warm}</div><div class="l">WARM</div></div>
    <div class="stat-pill cold"><div class="v">${cold}</div><div class="l">COLD</div></div>
    <div class="stat-pill signed"><div class="v">${signed}</div><div class="l">Signed</div></div>
    <div class="stat-pill"><div class="v">${contacted}</div><div class="l">In Progress</div></div>
  `;
}

function igSvg(){return `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`;}
function ttSvg(){return `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>`;}
function fbSvg(){return `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>`;}

function render(){
  const leads=getFiltered();
  document.getElementById('countLabel').textContent=`${leads.length} result${leads.length===1?'':'s'}`;
  const c=document.getElementById('tableContainer');
  if(currentView==='pipeline'){ renderPipeline(leads, c); return; }
  if(!leads.length){c.innerHTML='<div class="empty">No leads match this filter.</div>';return;}
  c.innerHTML=`<table>
    <thead><tr>
      <th>Name</th>
      <th>Address</th>
      <th>Phone</th>
      <th>Owner</th>
      <th>Score</th>
      <th>Social</th>
      <th>Status</th>
      <th>Notes</th>
      <th>Actions</th>
    </tr></thead>
    <tbody>
    ${leads.map(l=>{
      const status=l.status||'new';
      const igPostsBtn=l.instagram?`<button class="posts-btn" title="View recent posts" onclick="showIgPosts(event,'${l.instagram}')">📅</button>`:'';
      const igFollowers = l.ig_followers ? `<span style="font-size:9px;color:var(--muted)">${fmtFollowers(l.ig_followers)} followers</span>` : '';
      const ttFollowers = l.tt_followers ? `<span style="font-size:9px;color:var(--muted)">${fmtFollowers(l.tt_followers)} followers</span>` : '';
      const ig=l.instagram?`<div style="margin-bottom:2px"><a class="pill pill-ig" href="https://instagram.com/${l.instagram}" target="_blank">${igSvg()} @${l.instagram}</a>${igPostsBtn} ${igFollowers}</div>`
        :l.ig_signal?`<span class="pill pill-ig pill-dim">${igSvg()} IG?</span>`:'';
      const tt=l.tiktok?`<div style="margin-bottom:2px"><a class="pill pill-tt" href="https://tiktok.com/@${l.tiktok}" target="_blank">${ttSvg()} @${l.tiktok}</a> ${ttFollowers}</div>`
        :l.tt_signal?`<span class="pill pill-tt pill-dim">${ttSvg()} TT?</span>`:'';
      const fb=l.facebook?`<div><a class="pill pill-fb" href="https://facebook.com/${l.facebook}" target="_blank">${fbSvg()} FB</a></div>`
        :l.fb_signal?`<span class="pill pill-fb pill-dim">${fbSvg()} FB?</span>`:'';
      const website=l.website?`<a href="${l.website}" target="_blank" style="color:var(--muted);font-size:10px;text-decoration:none">🌐</a>`:'';
      const scanDate=l.scanned_at?new Date(l.scanned_at).toLocaleDateString():'';
      const ownerHtml = l.owner_name
        ? `<div style="font-size:11px;font-weight:600">${l.owner_name}</div>
           ${l.owner_phone?`<div style="font-size:10px;color:var(--accent)">${l.owner_phone}</div>`:''}
           ${l.owner_email?`<div style="font-size:10px;color:var(--muted)">${l.owner_email}</div>`:''}
           <div style="font-size:9px;color:var(--muted);margin-top:1px">${l.owner_source||''}</div>
           <button class="btn" style="font-size:8px;padding:1px 5px;margin-top:2px;opacity:0.5" onclick="clearOwner('${l.place_id}')">✕ Clear</button>`
        : `<button class="btn" style="font-size:9px;padding:2px 7px;white-space:nowrap" onclick="enrichLead('${l.place_id}')">🔍 Find Owner</button>`;
      const BIZ_ICONS = {restaurant:'🍽️',spa:'💆',hair_salon:'✂️',nail_salon:'💅',gym:'🏋️',yoga_studio:'🧘',dentist:'🦷',cafe:'☕',bar:'🍺',barber_shop:'💈',lodging:'🏨',car_wash:'🚗'};
      const bizType = l.business_type || 'restaurant';
      const bizIcon = BIZ_ICONS[bizType] || '🏢';
      const bizLabel = bizType.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
      const wasExported = !!l.exported_at;
      return `<tr id="row-${l.place_id}"${wasExported?' style="opacity:0.6"':''}>
        <td>
          <div style="font-weight:600">${l.name}${wasExported?' <span title="Already exported" style="color:#4ade80;font-size:11px">✓</span>':''}</div>
          <span class="badge badge-${(l.label||'cold').toLowerCase()}">${l.label||'?'}</span>
          <span style="font-size:9px;color:var(--muted);margin-left:4px">${bizIcon} ${bizLabel}</span>
          ${l.assigned_to?`<div style="font-size:9px;color:var(--accent);margin-top:2px">🙋 ${l.assigned_to}</div>`:''}
          ${scanDate?`<div style="font-size:9px;color:var(--muted);margin-top:2px">${scanDate}</div>`:''}
        </td>
        <td style="color:var(--muted);max-width:180px">${l.address||''} ${website}</td>
        <td style="white-space:nowrap">
          ${l.phone||'—'}
          ${l.business_email?`<div style="font-size:10px;color:var(--muted);margin-top:2px"><a href="mailto:${l.business_email}" style="color:var(--muted);text-decoration:none">✉️ ${l.business_email}</a></div>`:''}
        </td>
        <td style="min-width:140px" id="owner-${l.place_id}">${ownerHtml}</td>
        <td style="font-weight:700;color:var(--accent)">${l.score||0}</td>
        <td>${ig}${tt}${fb}</td>
        <td>
          <select class="status-sel badge badge-${status}" onchange="setStatus('${l.place_id}',this.value)">
            <option value="new"        ${status==='new'       ?'selected':''}>New</option>
            <option value="contacted"  ${status==='contacted' ?'selected':''}>📞 Contacted</option>
            <option value="interested" ${status==='interested'?'selected':''}>👀 Interested</option>
            <option value="signed"     ${status==='signed'    ?'selected':''}>✅ Signed</option>
            <option value="denied"     ${status==='denied'    ?'selected':''}>🚫 Denied</option>
            ${customStages.map(s=>`<option value="${s.id}" ${status===s.id?'selected':''}>${s.icon||'📁'} ${s.title}</option>`).join('')}
          </select>
        </td>
        <td><input class="notes-input" value="${(l.notes||'').replace(/"/g,'&quot;')}" placeholder="Add notes…" onblur="saveNotes('${l.place_id}',this.value)"/></td>
        <td style="white-space:nowrap">
          <button class="btn" style="font-size:10px;padding:2px 8px" onclick="showSalesScript('${l.place_id}')">📝 Script</button>
          <button class="btn" style="font-size:10px;padding:2px 8px;margin-top:3px" onclick="claimLead('${l.place_id}')">${l.assigned_to===_myName?'✋ Release':'🙋 Claim'}</button>
          <button class="btn" style="font-size:10px;padding:2px 8px;margin-top:3px" onclick="deleteLead('${l.place_id}')">Delete</button>
        </td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
}

// ── Pipeline (kanban) view ──
let currentView = localStorage.getItem('leadscout_view') || 'table';

function setView(v){
  currentView = v;
  localStorage.setItem('leadscout_view', v);
  document.getElementById('viewTableBtn').classList.toggle('active', v==='table');
  document.getElementById('viewPipeBtn').classList.toggle('active', v==='pipeline');
  render();
}

const PIPE_STAGES=[
  {id:'new',        title:'🆕 New',        color:'#7d8590', builtin:true},
  {id:'contacted',  title:'📞 Contacted',  color:'#6c63ff', builtin:true},
  {id:'interested', title:'👀 Interested', color:'#f5a623', builtin:true},
  {id:'signed',     title:'✅ Signed',     color:'#4ade80', builtin:true},
  {id:'denied',     title:'🚫 Denied',     color:'#555',    builtin:true},
];

// ── Custom stages (shared with the team via shared_settings.pipeline_stages) ──
let customStages = [];

async function loadCustomStages(){
  try{
    const {data, error} = await supabaseClient.from('shared_settings').select('pipeline_stages').eq('id',1).single();
    if(error) throw error;
    customStages = JSON.parse(data?.pipeline_stages || '[]');
  }catch(e){
    // Column missing or fetch failed — fall back to this browser only
    customStages = JSON.parse(localStorage.getItem('leadscout_custom_stages') || '[]');
  }
}

async function saveCustomStages(){
  localStorage.setItem('leadscout_custom_stages', JSON.stringify(customStages));
  const {error} = await supabaseClient.from('shared_settings').update({pipeline_stages: JSON.stringify(customStages)}).eq('id',1);
  if(error) console.warn('Custom stages saved locally only — add a pipeline_stages (text) column to shared_settings to sync across the team:', error.message);
}

function getAllStages(){ return [...PIPE_STAGES, ...customStages]; }

const ACTION_ICONS = { email:'📧', igdm:'💬', call:'📱' };

function renderPipeline(leads, c){
  c.innerHTML = `<div class="pipeline-wrap">` + getAllStages().map(st=>{
    const cards = leads.filter(l=>(l.status||'new')===st.id);
    const title = st.builtin ? st.title : `${st.icon||'📁'} ${st.title}`;
    const zap = st.action && st.action!=='none' ? `<span title="Automation: ${ACTION_ICONS[st.action]||''} runs when a lead is dropped here" style="font-size:11px">⚡</span>` : '';
    const del = st.builtin ? '' : `<button class="stage-del" onclick="deleteStage('${st.id}')" title="Delete this stage">✕</button>`;
    return `<div class="pipe-col" style="--pipe-color:${st.color}">
      <div class="pipe-col-head"><span class="t">${title}</span>${zap}<span class="n">${cards.length}</span>${del}</div>
      <div class="pipe-col-body" ondragover="pipeDragOver(event)" ondragleave="pipeDragLeave(event)" ondrop="pipeDrop(event,'${st.id}')">
        ${cards.length ? cards.map(pipeCard).join('') : '<div class="pipe-empty">Drop leads here</div>'}
      </div>
    </div>`;
  }).join('') + `<button class="add-stage-btn" onclick="openStageModal()">＋ Add Stage</button></div>`;
}

// ── Stage modal ──
let _stageColor = '#6c63ff';
function openStageModal(){
  document.getElementById('stageName').value='';
  document.getElementById('stageIcon').value='';
  document.getElementById('stageAction').value='none';
  document.getElementById('stageModalOverlay').style.display='flex';
  document.getElementById('stageName').focus();
}
function closeStageModal(){ document.getElementById('stageModalOverlay').style.display='none'; }
function pickStageColor(el){
  document.querySelectorAll('#stageColors .stage-swatch').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');
  _stageColor = el.dataset.c;
}
async function saveStage(){
  const title = document.getElementById('stageName').value.trim();
  if(!title){ alert('Give the stage a name.'); return; }
  const icon = document.getElementById('stageIcon').value.trim() || '📁';
  const action = document.getElementById('stageAction').value;
  const id = 'cs_' + title.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'') + '_' + Date.now().toString(36);
  customStages.push({ id, title, icon, color:_stageColor, action });
  await saveCustomStages();
  closeStageModal();
  render();
}
async function deleteStage(stageId){
  const st = customStages.find(s=>s.id===stageId);
  if(!st) return;
  const inStage = allLeads.filter(l=>l.status===stageId);
  if(!confirm(`Delete stage "${st.title}"?${inStage.length?` ${inStage.length} lead(s) in it will move back to New.`:''}`)) return;
  customStages = customStages.filter(s=>s.id!==stageId);
  await saveCustomStages();
  if(inStage.length){
    inStage.forEach(l=>l.status='new');
    await supabaseClient.from('leads').update({status:'new'}).eq('status', stageId);
  }
  renderStats(); render();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// Compute the general pitch script for a lead (same math as showSalesScript)
function getLeadScript(lead){
  let eng=null;
  if(lead.ig_engagement){ try{ eng = typeof lead.ig_engagement==='string' ? JSON.parse(lead.ig_engagement) : lead.ig_engagement; }catch(e){} }
  const followers=lead.ig_followers||0;
  const engRate=eng?.engagement_rate||eng?.engagement_rate_percentages||null;
  const posts=eng?.posts_details||[];
  const avgLikes=posts.length?Math.round(posts.reduce((s,p)=>s+(p.likes||0),0)/posts.length):null;
  const avgComments=posts.length?Math.round(posts.reduce((s,p)=>s+(p.comments||0),0)/posts.length):null;
  let postsPerMonth=null;
  const sorted=[...posts].filter(p=>p.taken_at).sort((a,b)=>b.taken_at-a.taken_at);
  if(sorted.length>=2){
    const months=(sorted[0].taken_at*1000 - sorted[sorted.length-1].taken_at*1000)/(1000*60*60*24*30.5);
    postsPerMonth=months>0?Math.round(sorted.length/months):sorted.length;
  }
  const lastPost=posts[0]?.time_ago||null;
  const size=followers>=10000?'large':followers>=1000?'medium':'small';
  return buildScript({ tier:(lead.label||'cold').toLowerCase(), size, bizType:lead.business_type||'restaurant', name:lead.name||'this business', handle:lead.instagram?`@${lead.instagram}`:'', followers, engRate, avgLikes, avgComments, postsPerMonth, lastPost, lead });
}

async function sendAutoEmail(lead){
  const email = lead.business_email || lead.owner_email;
  if(!email){ showToast(`⚠️ ${lead.name} has no email on file`); return; }
  const subject = `Quick idea for ${lead.name}`;
  const text = getLeadScript(lead);
  if(window._resendEnabled){
    showToast(`📤 Sending email to ${email}…`);
    try{
      const r = await fetch('/send-email', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ to: email, subject, text })
      });
      const json = await r.json();
      if(json.ok){
        showToast(`✅ Email sent to ${email}`);
        // Stamp it in notes so the whole team sees it
        const stamp = `[📧 auto-emailed ${new Date().toLocaleDateString()}]`;
        if(!(lead.notes||'').includes('auto-emailed')){
          lead.notes = ((lead.notes||'') + ' ' + stamp).trim();
          await supabaseClient.from('leads').update({notes: lead.notes}).eq('place_id', lead.place_id);
          render();
        }
      } else {
        showToast(`❌ Email failed: ${json.error||'unknown error'}`);
      }
    }catch(e){ showToast(`❌ Email failed: ${e.message}`); }
  } else {
    // No Resend key configured — fall back to opening the user's mail client
    window.open(`mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(text)}`);
    showToast(`📧 Email drafted to ${email} (add a Resend key in Settings for auto-send)`);
  }
}

function runStageAction(stage, lead){
  if(stage.action==='email'){
    sendAutoEmail(lead);
  } else if(stage.action==='igdm'){
    if(!lead.instagram){ showToast(`⚠️ ${lead.name} has no Instagram handle`); return; }
    navigator.clipboard.writeText(getLeadScript(lead)).catch(()=>{});
    window.open(`https://ig.me/m/${lead.instagram}`,'_blank');
    showToast(`💬 Pitch copied — paste it in the DM`);
  } else if(stage.action==='call'){
    if(!lead.phone){ showToast(`⚠️ ${lead.name} has no phone number`); return; }
    window.open(`tel:${lead.phone.replace(/[^\d+]/g,'')}`);
    showToast(`📱 Calling ${lead.name}`);
  }
}

function pipeDragEnd(e){ e.target.classList.remove('dragging'); }
function pipeDragOver(e){

}
function pipeDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }

async function setStatus(placeId, status){
  const lead = allLeads.find(l=>l.place_id===placeId);
  if(!lead) return;
  lead.status = status;
  const {error} = await supabaseClient.from('leads').update({status, updated_by: currentUser ? currentUser.id : null, updated_at: new Date().toISOString()}).eq('place_id', placeId);
  if(error) console.error('setStatus', error);
  // Custom stage with an automation attached? Fire it.
  const customStage = customStages.find(s=>s.id===status);
  if(customStage && customStage.action && customStage.action!=='none') runStageAction(customStage, lead);
  if(status==='denied'){
    const blEntry = {place_id:placeId, name:lead.name, blacklisted_by: currentUser ? currentUser.id : null, blacklisted_at: new Date().toISOString()};
    await dbPut('blacklist', blEntry);
    blacklist = blacklist.filter(b=>b.place_id!==placeId);
    blacklist.push(blEntry);

    document.getElementById('blacklistToggle').style.display='flex';
  } else {
    await dbDel('blacklist',placeId);
    blacklist = blacklist.filter(b=>b.place_id!==placeId);
    document.getElementById('blCount').textContent=blacklist.length;
  }
  renderStats();
  render();
}

function parseAddress(address){
  // "123 Main St, City, State ZIP, Country" → {street, city, state}
  const parts=(address||'').split(',').map(s=>s.trim());
  const street=parts[0]||'';
  const city=parts[1]||'';
  const stateZip=parts[2]||'';
  const state=stateZip.replace(/\d{5}(-\d{4})?/,'').trim();
  return {street,city,state};
}
function esc(v){ return `"${String(v||'').replace(/"/g,'""')}"`; }

function relDate(ts) {
  const sec = Math.floor(Date.now()/1000) - ts;
  if (sec < 3600) return Math.floor(sec/60)+'m ago';
  if (sec < 86400) return Math.floor(sec/3600)+'h ago';
  if (sec < 604800) return Math.floor(sec/86400)+'d ago';
  if (sec < 2592000) return Math.floor(sec/604800)+'w ago';
  return Math.floor(sec/2592000)+'mo ago';
}
function fmtNum(n) {
  if (n == null) return '';
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'')+'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k';
  return String(n);
}
function fmtFollowers(n) {
  if (!n) return '';
  n = parseInt(n);
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'')+'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k';
  return String(n);
}
function mediaIcon(type) {
  if (type === 2) return '🎬';
  if (type === 8) return '🖼';
  return '📸';
}

const _postsCache = {};

function showIgPosts(event, handle) {
  event.stopPropagation();
  const popup = document.getElementById('postsPopup');
  const btn = event.currentTarget;
  const rect = btn.getBoundingClientRect();

  popup.style.display = 'block';
  popup.innerHTML = `<h4>${igSvg()} @${handle} <span class="close-x" onclick="closePostsPopup()">✕</span></h4><div style="color:var(--muted);padding:8px 0">Loading…</div>`;

  // Position below the button
  popup.style.left = Math.min(rect.left, window.innerWidth - 300) + 'px';
  popup.style.top = (rect.bottom + 6) + 'px';

  // Check if we already have stored engagement data for this lead
  const storedLead = allLeads.find(l => l.instagram === handle);
  if (storedLead?.ig_engagement) {
    try {
      const data = typeof storedLead.ig_engagement === 'string'
        ? JSON.parse(storedLead.ig_engagement) : storedLead.ig_engagement;
      _postsCache[handle] = { posts: data.posts_details, engagementRate: data.engagement_rate, recentExplanation: data.recent_posts_explanation };
      renderPostsPopup(handle, _postsCache[handle]);
      return;
    } catch(e) {}
  }

  if (_postsCache[handle]) { renderPostsPopup(handle, _postsCache[handle]); return; }

  const apiKey = window._rapidApiKey || localStorage.getItem('leadscout_rapidapi_key');
  if (!apiKey) {
    document.getElementById('postsPopup').innerHTML = `<h4>@${handle} <span class="close-x" onclick="closePostsPopup()">✕</span></h4><div style="color:var(--hot)">No RapidAPI key found. Add it in the Scanner page settings.</div>`;
    return;
  }

  fetch(`/rapidapi-ig-posts?handle=${encodeURIComponent(handle)}&key=${encodeURIComponent(apiKey)}`)
  .then(r => r.json()).then(json => {
    console.log('[ig-posts] raw response:', JSON.stringify(json).slice(0, 500));
    if (json.message && !json.posts_details) throw new Error('API: ' + json.message);
    if (json.error) throw new Error(json.error + (json.detail ? ': ' + JSON.stringify(json.detail).slice(0,200) : ''));
    const posts = json?.posts_details || json?.data?.posts_details || [];
    if (!posts.length) throw new Error('Keys: ' + Object.keys(json).join(', ') + ' | ' + JSON.stringify(json).slice(0,200));
    _postsCache[handle] = { posts, engagementRate: json.engagement_rate_percentages, recentExplanation: json.recent_posts_explanation };
    renderPostsPopup(handle, _postsCache[handle]);
    // Persist to the lead so this never needs the API again (and scripts get real data)
    const leadToUpdate = allLeads.find(l => l.instagram === handle);
    if (leadToUpdate) {
      leadToUpdate.ig_engagement = JSON.stringify({ posts_details: posts, engagement_rate: json.engagement_rate_percentages, recent_posts_explanation: json.recent_posts_explanation });
      supabaseClient.from('leads').update({ ig_engagement: leadToUpdate.ig_engagement }).eq('place_id', leadToUpdate.place_id).then(({error}) => { if(error) console.warn('ig_engagement save', error); });
    }
  }).catch(err => {
    document.getElementById('postsPopup').innerHTML = `<h4>@${handle} <span class="close-x" onclick="closePostsPopup()">✕</span></h4><div style="color:var(--hot);font-size:10px;word-break:break-all">${err.message}</div>`;
  });
}

function renderPostsPopup(handle, data) {
  const popup = document.getElementById('postsPopup');
  if (!data?.posts?.length) { popup.innerHTML = `<h4>@${handle} <span class="close-x" onclick="closePostsPopup()">✕</span></h4><div style="color:var(--muted)">No posts found.</div>`; return; }
  const engLine = data.engagementRate != null
    ? `<div style="font-size:10px;color:var(--warm);margin-bottom:8px">📊 ${data.engagementRate.toFixed(1)}% engagement · ${data.recentExplanation||''}</div>`
    : '';
  const rows = data.posts.map(p => {
    return `<div class="prow">
      <span class="pdate">${p.time_ago||relDate(p.taken_at)}</span>
      <span class="pstats">❤️ ${fmtNum(p.likes)} · 💬 ${fmtNum(p.comments)}</span>
    </div>`;
  }).join('');
  popup.innerHTML = `<h4>${igSvg()} @${handle} <span class="close-x" onclick="closePostsPopup()">✕</span></h4>${engLine}${rows}`;
}

function closePostsPopup() {
  document.getElementById('postsPopup').style.display = 'none';
}
document.addEventListener('click', e => {
  const popup = document.getElementById('postsPopup');
  if (popup.style.display !== 'none' && !popup.contains(e.target)) closePostsPopup();
});

// ── Sales Script Generator ──

function showSalesScript(placeId) {
  const lead = allLeads.find(l => l.place_id === placeId);
  if (!lead) return;

  let eng = null;
  if (lead.ig_engagement) {
    try { eng = typeof lead.ig_engagement === 'string' ? JSON.parse(lead.ig_engagement) : lead.ig_engagement; } catch(e) {}
  }

  // Compute stats
  const followers = lead.ig_followers || 0;
  const engRate = eng?.engagement_rate || eng?.engagement_rate_percentages || null;
  const posts = eng?.posts_details || [];
  const avgLikes = posts.length ? Math.round(posts.reduce((s,p)=>s+(p.likes||0),0)/posts.length) : null;
  const avgComments = posts.length ? Math.round(posts.reduce((s,p)=>s+(p.comments||0),0)/posts.length) : null;

  // Posts per month from last 12 posts
  let postsPerMonth = null;
  if (posts.length >= 2) {
    const sorted = [...posts].filter(p=>p.taken_at).sort((a,b)=>b.taken_at-a.taken_at);
    if (sorted.length >= 2) {
      const newest = sorted[0].taken_at * 1000;
      const oldest = sorted[sorted.length-1].taken_at * 1000;
      const months = (newest - oldest) / (1000*60*60*24*30.5);
      postsPerMonth = months > 0 ? Math.round(sorted.length / months) : sorted.length;
    }
  }
  const lastPost = posts[0]?.time_ago || null;

  // Classify size
  const size = followers >= 10000 ? 'large' : followers >= 1000 ? 'medium' : 'small';
  const tier = (lead.label || 'cold').toLowerCase();
  const bizType = lead.business_type || 'restaurant';
  const name = lead.name || 'this business';
  const handle = lead.instagram ? `@${lead.instagram}` : '';

  const script = buildScript({ tier, size, bizType, name, handle, followers, engRate, avgLikes, avgComments, postsPerMonth, lastPost, lead });

  const statPills = buildStatPills({ followers, engRate, avgLikes, avgComments, postsPerMonth, lastPost });

  const tierColor = tier === 'hot' ? 'var(--hot)' : tier === 'warm' ? 'var(--warm)' : 'var(--muted)';
  const tierEmoji = tier === 'hot' ? '🔥' : tier === 'warm' ? '🌡️' : '❄️';
  const sizeLabel = size === 'large' ? 'Large account' : size === 'medium' ? 'Mid-size account' : 'Small/new account';

  // Social profile segment
  const seg = getSocialSegment(lead, followers, engRate);

  // Build one script per segment tab
  const allSegments = getAllSegmentScripts({ tier, size, bizType, name, handle, followers, engRate, avgLikes, avgComments, postsPerMonth, lastPost, lead });
  const tabs = allSegments.map((s, i) =>
    `<button class="seg-tab${i===0?' active':''}" onclick="switchSegTab(this,${i})" title="${s.desc}">${s.icon} ${s.label}</button>`
  ).join('');
  const bodies = allSegments.map((s, i) =>
    `<div class="seg-body${i===0?'':' hidden'}" id="segBody${i}">${s.script}</div>`
  ).join('');

  document.getElementById('scriptModalInner').innerHTML = `
    <button class="script-close" onclick="closeScriptModal()">✕</button>
    <h3>${name}</h3>
    <div class="script-meta">
      <span style="color:${tierColor}">${tierEmoji} ${(lead.label||'COLD').toUpperCase()}</span>
      ${handle ? `<span>${igSvg()} ${handle}</span>` : ''}
      <span>👥 ${sizeLabel}</span>
      ${seg ? `<span title="${seg.desc}">🎯 ${seg.label}</span>` : ''}
      ${lead.score ? `<span>⭐ Score ${lead.score}</span>` : ''}
    </div>
    ${statPills}
    <div class="script-section">
      <h4>Pitch Scripts by Profile Type</h4>
      <div class="seg-tabs">${tabs}</div>
      <div class="script-body" id="scriptText">${bodies}</div>
    </div>
    <button class="copy-btn" onclick="copyScript()">📋 Copy Script</button>
  `;
  document.getElementById('scriptModalOverlay').style.display = 'flex';
}

function switchSegTab(btn, idx) {
  btn.closest('.script-section').querySelectorAll('.seg-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.script-section').querySelectorAll('.seg-body').forEach((b,i) => {
    b.classList.toggle('hidden', i !== idx);
  });
}

// Detect the primary social segment for this lead
function getSocialSegment(lead, igFollowers, engRate) {
  const ig = igFollowers || 0;
  const tt = lead.tt_followers || 0;
  const hasWeb = !!(lead.website || lead.url);
  const engLow = engRate != null && Number(engRate) < 2;
  const engHigh = engRate != null && Number(engRate) >= 5;

  if (!ig && !tt) return { label: 'No Social', desc: 'No Instagram or TikTok found', icon: '👻' };
  if (ig > 1000 && tt > 1000) return engLow
    ? { label: 'Big Audience, Low Engagement', desc: 'Strong on both platforms but audience is cold', icon: '📉' }
    : { label: 'Strong IG + TikTok', desc: 'Active on both platforms', icon: '🚀' };
  if (ig > 500 && tt < 200) return { label: 'IG Only', desc: 'Good Instagram, missing TikTok', icon: '📸' };
  if (tt > 500 && ig < 200) return { label: 'TikTok Only', desc: 'Good TikTok, weak Instagram', icon: '🎵' };
  if (!hasWeb) return { label: 'No Website', desc: 'Has social but no website', icon: '🌐' };
  return { label: 'Mixed Presence', desc: 'Partial social presence', icon: '📊' };
}

function buildStatPills({ followers, engRate, avgLikes, avgComments, postsPerMonth, lastPost }) {
  const pills = [];
  if (followers) pills.push(`<div class="script-stat-pill"><b>${fmtNum(followers)}</b>Followers</div>`);
  if (engRate != null) pills.push(`<div class="script-stat-pill"><b>${Number(engRate).toFixed(1)}%</b>Engagement</div>`);
  if (avgLikes != null) pills.push(`<div class="script-stat-pill"><b>${fmtNum(avgLikes)}</b>Avg Likes</div>`);
  if (avgComments != null) pills.push(`<div class="script-stat-pill"><b>${fmtNum(avgComments)}</b>Avg Comments</div>`);

  return pills.length ? `<div class="script-stat-pills">${pills.join('')}</div>` : '';
}

// ── Auto-refresh ──
let _autoRefreshTimer = null;
let _lastRefresh = 0;

async function autoRefresh() {
  const now = Date.now();
  const { data: newLeads } = await supabaseClient.from('leads').select('*').gt('scanned_at', _lastRefresh);
  if (newLeads?.length) {
    let added = 0;
    for (const lead of newLeads) {
      const idx = allLeads.findIndex(l => l.place_id === lead.place_id);
      if (idx === -1) { allLeads.push(lead); added++; }
      else allLeads[idx] = { ...allLeads[idx], ...lead };
    }
    _lastRefresh = now;
    renderStats();
    buildLocationOptions();
    buildBizTypeChips();
    render();
    if (added) {
      const badge = document.getElementById('refreshBadge');
      if (badge) { badge.textContent = `+${added} new`; badge.style.opacity = '1'; setTimeout(() => badge.style.opacity = '0', 2000); }
    }
  }
}

function startAutoRefresh() {
  _lastRefresh = Date.now();
  _autoRefreshTimer = setInterval(autoRefresh, 15000);
  document.getElementById('refreshDot').style.background = 'var(--cold)';
}
function stopAutoRefresh() {
  clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = null;
  document.getElementById('refreshDot').style.background = 'var(--muted)';
}
function toggleAutoRefresh() {
  _autoRefreshTimer ? stopAutoRefresh() : startAutoRefresh();
}

// ── Lead claiming (assign a lead to yourself so the team doesn't double-work it) ──
let _myName = '';

async function claimLead(placeId){
  const lead = allLeads.find(l=>l.place_id===placeId);
  if(!lead) return;
  const newVal = lead.assigned_to === _myName ? null : _myName; // toggle
  lead.assigned_to = newVal;
  const {error} = await supabaseClient.from('leads').update({assigned_to:newVal}).eq('place_id', placeId);
  if(error){ console.error('claimLead', error); showToast('❌ Claim failed — is the assigned_to column added in Supabase?'); return; }
  showToast(newVal ? `🙋 You claimed ${lead.name}` : `Released ${lead.name}`);
  render();
}

// ── Team activity feed (built from updated_at/updated_by on leads) ──
let _profileNames = {}; // user id -> name

async function loadProfileNames(){
  const {data} = await supabaseClient.from('user_profiles').select('id,name');
  (data||[]).forEach(p => _profileNames[p.id] = p.name || 'Someone');
}

function timeAgo(iso){
  if(!iso) return '';
  const s = (Date.now() - new Date(iso).getTime())/1000;
  if(s<60) return 'just now';
  if(s<3600) return `${Math.floor(s/60)}m ago`;
  if(s<86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function toggleActivityPanel(){
  const p = document.getElementById('activityPanel');
  const open = p.style.display === 'flex';
  p.style.display = open ? 'none' : 'flex';
  if(!open) renderActivity();
}

function renderActivity(){
  const list = document.getElementById('activityList');
  const STATUS_LABELS = {new:'🆕 New',contacted:'📞 Contacted',interested:'👀 Interested',signed:'✅ Signed',denied:'🚫 Denied'};
  const recent = allLeads
    .filter(l=>l.updated_at && l.updated_by)
    .sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at))
    .slice(0,25);
  if(!recent.length){ list.innerHTML = '<div style="font-size:11px;color:var(--muted)">No activity yet — status changes will show up here.</div>'; return; }
  list.innerHTML = recent.map(l=>{
    const who = _profileNames[l.updated_by] || 'Someone';
    const stage = STATUS_LABELS[l.status] || (customStages.find(s=>s.id===l.status)?`${customStages.find(s=>s.id===l.status).icon||'📁'} ${customStages.find(s=>s.id===l.status).title}`:l.status);
    return `<div style="font-size:11px;display:flex;gap:6px;align-items:baseline">
      <span style="color:var(--muted);font-size:9px;min-width:52px">${timeAgo(l.updated_at)}</span>
      <span><b>${who}</b> moved <b>${l.name}</b> to ${stage}</span>
    </div>`;
  }).join('');
}

async function saveEmailSettings(){
  if(!isAdmin()){ showToast('Only the admin can change email settings'); return; }
  const key = document.getElementById('resendKeyInput').value.trim();
  const from = document.getElementById('resendFromInput').value.trim();
  const {error} = await supabaseClient.from('shared_settings').update({resend_key:key||null, resend_from:from||null}).eq('id',1);

}

      <span style="font-size:12px;flex:1">${p.name || '(no name)'}</span>
      <button class="btn btn-p" style="font-size:10px;padding:3px 10px" onclick="approveAccount('${p.id}')">✓ Approve</button>
      <button class="btn btn-danger" style="font-size:10px;padding:3px 10px" onclick="denyAccount('${p.id}')">✕ Deny</button>
    </div>
  `).join('');
}

async function approveAccount(userId){
  const { error } = await supabaseClient.from('user_profiles').update({ approved: true }).eq('id', userId);
  if(error){ console.error('approveAccount', error); return; }
  await loadPendingAccounts();
}

async function denyAccount(userId){
  if(!confirm('Deny this account? They will remain unapproved and unable to sign in.')) return;
  // Leave approved=false; admin can delete the auth user manually from Supabase if needed.
  await loadPendingAccounts();
}

function togglePendingPanel(){
  const p = document.getElementById('pendingPanel');
  const open = p.style.display === 'flex';
  p.style.display = open ? 'none' : 'flex';
  if(!open) loadPendingAccounts();
}

// ── Init ──
(async () => {
  const user = await requireAuth();
  if(!user) return;
  const uname = await getUserName();
  _myName = uname;
  const lbl = document.getElementById('userLabel');
  if(lbl) lbl.textContent = uname;
  if (isAdmin()) {
    document.getElementById('pendingBtn').style.display = '';
    document.getElementById('settingsBtn').style.display = '';
    loadPendingAccounts();
  }
  loadProfileNames();
  // Email auto-send: on if a Resend key is saved in shared_settings
  const { data: emailSettings } = await supabaseClient.from('shared_settings').select('resend_key,resend_from').eq('id',1).single();
  window._resendEnabled = !!emailSettings?.resend_key;
  if (isAdmin()) {
    if(emailSettings?.resend_key) document.getElementById('resendKeyInput').value = emailSettings.resend_key;
    if(emailSettings?.resend_from) document.getElementById('resendFromInput').value = emailSettings.resend_from;
  }
  // Load Apollo key from localStorage
  const savedApollo = localStorage.getItem('leadscout_apollo_key');
  if(savedApollo) document.getElementById('apolloKeyInput').value = savedApollo;
  // RapidAPI key: shared_settings is the source of truth (same as scanner page);
  // localStorage is only a fallback if the shared fetch fails
  const { data: sharedSettings } = await supabaseClient.from('shared_settings').select('rapid_key').eq('id', 1).single();
  const rapidKey = sharedSettings?.rapid_key || localStorage.getItem('leadscout_rapidapi_key') || '';
  if (rapidKey) {
    window._rapidApiKey = rapidKey;
    localStorage.setItem('leadscout_rapidapi_key', rapidKey);
    document.getElementById('rapidApiKeyInput').value = rapidKey;
    window.postMessage({ __leadscout_ext: true, type: 'set_rapidapi_key', key: rapidKey }, '*');
  }
  // Lock API key inputs to admin only
  if (!isAdmin()) {
    ['rapidApiKeyInput','apolloKeyInput','resendKeyInput','resendFromInput'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.value = '••••••••••••••••'; el.disabled = true; el.style.opacity = '0.4'; el.style.cursor = 'not-allowed'; }
    });
  }

  await load();
  _lastRefresh = Date.now();
})();
</script>
</body>
</html>
