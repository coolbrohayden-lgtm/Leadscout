<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LeadScout — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0c10;--surface:#111419;--surface2:#181c24;--surface3:#1f2430;
  --border:#232936;--border-light:#2e3646;
  --text:#e8ecf1;--muted:#8b93a1;--muted2:#5c6470;
  --accent:#6c63ff;--accent-hover:#7d75ff;--hot:#ff6b6b;
  --focus-ring:0 0 0 3px rgba(108,99,255,.25);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% -10%,rgba(108,99,255,.12),transparent);pointer-events:none;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 42px;width:100%;max-width:390px;box-shadow:0 24px 64px rgba(0,0,0,.5);position:relative;}
.logo{font-size:22px;font-weight:800;letter-spacing:-.02em;text-align:center;margin-bottom:28px;}
.logo span{background:linear-gradient(135deg,var(--accent),#9c8cff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:26px;background:var(--surface2);}
.tab{flex:1;padding:9px;font-size:12.5px;font-weight:600;font-family:inherit;text-align:center;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;border:none;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--accent);color:#fff;}
.field{margin-bottom:15px;}
.field label{display:block;font-size:10px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;padding:10px 13px;outline:none;transition:all .15s;}
.field input:focus{border-color:var(--accent);box-shadow:var(--focus-ring);}
.field input::placeholder{color:var(--muted2);}
.btn{width:100%;padding:11px;border-radius:8px;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;border:none;background:var(--accent);color:#fff;margin-top:6px;transition:all .15s;box-shadow:0 2px 12px rgba(108,99,255,.35);}
.btn:hover{background:var(--accent-hover);}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
.error{font-size:12px;color:var(--hot);margin-top:13px;text-align:center;min-height:18px;}
.success{font-size:12px;color:#3fdd8d;margin-top:13px;text-align:center;min-height:18px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lead<span>Scout</span></div>
  <div class="tabs">
    <button class="tab active" id="tabSignIn" onclick="showTab('signin')">Sign In</button>
    <button class="tab" id="tabSignUp" onclick="showTab('signup')">Sign Up</button>
  </div>

  <!-- Sign In -->
  <div id="formSignIn">
    <div class="field"><label>Email</label><input id="siEmail" type="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input id="siPass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn" id="siBtn" onclick="signIn()">Sign In</button>
    <div class="error" id="siErr"></div>
  </div>

  <!-- Sign Up -->
  <div id="formSignUp" style="display:none">
    <div class="field"><label>Name</label><input id="suName" type="text" placeholder="Your name"/></div>
    <div class="field"><label>Email</label><input id="suEmail" type="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input id="suPass" type="password" placeholder="Min 6 characters" autocomplete="new-password"/></div>
    <button class="btn" id="suBtn" onclick="signUp()">Create Account</button>
    <div class="error" id="suErr"></div>
    <div class="success" id="suOk"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL = 'https://yiutqeuiwdrfiwioyhwr.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpdXRxZXVpd2RyZml3aW95aHdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNzU3NDgsImV4cCI6MjA5Nzg1MTc0OH0.TlIwAggWacEj1ZutusH-gaMa2LSt_ZAjov-2Ao3LHlo';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function showTab(tab){
  document.getElementById('formSignIn').style.display = tab==='signin'?'':'none';
  document.getElementById('formSignUp').style.display = tab==='signup'?'':'none';
  document.getElementById('tabSignIn').classList.toggle('active', tab==='signin');
  document.getElementById('tabSignUp').classList.toggle('active', tab==='signup');
}

async function signIn(){
  const email = document.getElementById('siEmail').value.trim();
  const pass  = document.getElementById('siPass').value;
  const btn   = document.getElementById('siBtn');
  const err   = document.getElementById('siErr');
  err.textContent='';
  if(!email||!pass){err.textContent='Please fill in all fields.';return;}
  btn.disabled=true; btn.textContent='Signing in…';
  const {error} = await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message; btn.disabled=false; btn.textContent='Sign In'; return;}
  window.location.href='/';
}

async function signUp(){
  const name  = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const pass  = document.getElementById('suPass').value;
  const btn   = document.getElementById('suBtn');
  const err   = document.getElementById('suErr');
  const ok    = document.getElementById('suOk');
  err.textContent=''; ok.textContent='';
  if(!name||!email||!pass){err.textContent='Please fill in all fields.';return;}
  if(pass.length<6){err.textContent='Password must be at least 6 characters.';return;}
  btn.disabled=true; btn.textContent='Creating account…';
  const {data, error} = await sb.auth.signUp({email, password:pass, options:{data:{name}}});
  if(error){err.textContent=error.message; btn.disabled=false; btn.textContent='Create Account'; return;}
  // Insert user profile — new accounts start unapproved and need admin sign-off
  if(data.user){
    await sb.from('user_profiles').upsert({id:data.user.id, name, approved:false});
  }
  ok.textContent='Account created! Check your email to confirm. An admin also needs to approve your account before you can sign in.';
  btn.disabled=false; btn.textContent='Create Account';
}

// If already logged in, redirect
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='/';
});

// Allow Enter key
document.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    if(document.getElementById('formSignIn').style.display!=='none') signIn();
    else signUp();
  }
});
</script>
</body>
</html>
