<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LeadScout — Pending Approval</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0c0e;--surface:#101114;--surface2:#16181c;--surface3:#1d2025;
  --border:#24272e;--border-light:#31353e;
  --text:#e7e9ee;--muted:#8a8f98;--accent:#5e6ad2;--accent-hover:#7c87e0;--warm:#f2a33c;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% -10%,rgba(94,106,210,.14),transparent);pointer-events:none;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 42px;width:100%;max-width:390px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.5);position:relative;}
.logo{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:22px;}
.logo span{background:linear-gradient(135deg,var(--accent),#8b96e8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.icon{font-size:38px;margin-bottom:16px;}
h1{font-size:17px;font-weight:700;letter-spacing:-.01em;margin-bottom:10px;}
p{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:22px;}
.btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .15s;}
.btn:hover{background:var(--surface3);border-color:var(--border-light);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lead<span>Scout</span></div>
  <div class="icon">⏳</div>
  <h1>Waiting on approval</h1>
  <p>Your account has been created, but an admin needs to approve it before you can sign in. Check back soon, or reach out to whoever invited you.</p>
  <button class="btn" onclick="signOutAndGoLogin()">Sign Out</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/auth.js"></script>
<script>
async function signOutAndGoLogin(){
  await supabaseClient.auth.signOut();
  window.location.href = '/login';
}
// If not signed in at all, bounce to login. If already approved, go to app.
(async () => {
  const user = await getCurrentUser();
  if (!user) { window.location.href = '/login'; return; }
  if (user.email === ADMIN_EMAIL) { window.location.href = '/'; return; }
  const { data: profile } = await supabaseClient.from('user_profiles').select('approved').eq('id', user.id).single();
  if (profile && profile.approved === true) window.location.href = '/';
})();
</script>
</body>
</html>
